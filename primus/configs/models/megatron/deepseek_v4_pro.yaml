seq_length: 4096
max_position_embeddings: 1048576

vocab_size: 129280
make_vocab_size_divisible_by: 64

tokenizer_type: DeepSeekV4Tokenizer
tokenizer_model: deepseek-ai/DeepSeek-V4-Pro
trust_remote_code: true

init_method_std: 0.02
