###############################################################################
# DeepSeek-V4 base config (defaults shared by V4-Flash / V4-Pro / etc.).
#
# Reference:
#   - deepseek-v4/deepseek-ai/DeepSeek-V4-Flash/config.json
#   - deepseek-v4/deepseek-ai/DeeSeek-v4-Pro/config.json
#   - deepseek-v4/develop/techblog/01-deepseek-v4-architecture-deep-dive.md
###############################################################################

extends:
  - llama_base.yaml

# Mark this model family as DeepSeek-V4. The Primus trainer
# (megatron_pretrain_trainer.py) and import_utils.get_model_provider use this
# string to dispatch to the V4-specific builder.
model_type: deepseek_v4

# norm
norm_epsilon: 1.0e-06

# attention base shape
# V4 uses a single shared latent for K = V (head_dim=512), num_key_value_heads=1.
# The Megatron MLA path (multi_latent_attention=true) is *NOT* reused here
# because V4 layers also need CSA / HCA / SWA branches; we will register a
# new V4 attention spec in Phase 3+. Keep MLA off so we don't accidentally go
# down the V3 path in Phase 1 / 2 stub builders.
multi_latent_attention: false
qk_layernorm: false
apply_rope_fusion: false   # V4 uses partial RoPE on a 512-dim head; fused path doesn't fit.

# ---------- Hyper-Connections (mHC) ----------
hc_mult: 4
hc_sinkhorn_iters: 20
hc_eps: 1.0e-06
hc_use_sinkhorn: true
mtp_use_separate_hc_head: true

# ---------- Hybrid Attention ----------
hybrid_attention_enabled: true
compress_ratios: null            # provided by the per-variant yaml (Flash / Pro);
                                 # entries: 0 = dense+SWA, 4 = CSA, 128 = HCA
compress_rope_theta: 160000.0
index_topk: 512
index_head_dim: 128
index_n_heads: 64
attn_sliding_window: 128
attn_sink: true

# DeepSeek-V4 attention backend selection (unified string selectors). The run
# script sets these via PRIMUS_USE_V4_ATTENTION_BACKEND /
# PRIMUS_USE_V4_CSA_ATTENTION_BACKEND (see run_deepseek_v4.sh).
#   use_v4_attention_backend     (dense cr=0 / HCA cr=128): eager|triton_v1|triton_v2|gluon
#   use_v4_csa_attention_backend (CSA cr=4): eager|triton_v0|triton_v1|triton_v2|gluon|flydsl_v0
# use_turbo_attention (when a core_attention module is built) still takes
# precedence for the dense path.
use_v4_attention_backend: triton_v1
use_v4_csa_attention_backend: triton_v1

# FP8 (E4M3) Indexer QK path (CSA selector). Default off; the indexer QK
# scoring inputs are fake-quantized to FP8 when enabled (BF16 index-score /
# top-k path is preserved). Surface via PRIMUS_USE_V4_FP8_INDEXER.
use_v4_fp8_indexer: false

# Plan-5 P29 (RESCOPED): wrap ``sinkhorn_normalize`` (the doubly-stochastic
# projection inside HyperMixer.compute_weights) with a cached
# ``torch.compile(fullgraph=True, dynamic=False)`` build. Collapses the
# 39 fp32 ``aten::sum`` reductions per call into a single Inductor-fused
# Triton kernel; AOT autograd handles BWD. Default ``false`` until G32
# (FWD + BWD parity) and G33b (post-P29 trace) flip it on. Driven by
# the ``PRIMUS_USE_V4_COMPILED_SINKHORN`` env var via run_deepseek_v4.sh.
use_v4_compiled_sinkhorn: false

# ---------- Output projection (grouped low-rank) ----------
o_groups: 8
o_lora_rank: 1024

# ---------- MoE ----------
moe_layer_freq: 1
moe_router_topk: 6
moe_router_score_function: sqrtsoftplus    # V4 default
moe_router_load_balancing_type: seq_aux_loss
moe_router_enable_expert_bias: true        # noaux_tc
moe_router_bias_update_rate: 1.0e-3
moe_router_topk_scaling_factor: 1.5        # routed_scaling_factor (Flash 1.5 / Pro 2.5)
moe_token_dispatcher_type: alltoall
moe_aux_loss_coeff: 0.001
moe_router_dtype: null                     # fp32 recommended at training time
moe_router_pre_softmax: false
moe_grouped_gemm: true
moe_use_legacy_grouped_gemm: false
moe_permute_fusion: true
moe_shared_expert_overlap: true
num_hash_layers: 3                         # First 3 MoE layers use hash routing

# ---------- MTP ----------
mtp_num_layers: 1                          # num_nextn_predict_layers
mtp_loss_scaling_factor: 0.1

# ---------- RoPE (main path; compressed layers also use compress_rope_theta) ----------
rotary_base: 10000
rope_type: yarn
rotary_scaling_factor: 16.0                # YaRN factor (only enabled on compress layers in code)
original_max_position_embeddings: 65536
mscale: 1.0
mscale_all_dim: 1.0
rotary_interleaved: true                    # released weights use interleaved RoPE

# ---------- Activation ----------
swiglu: true
swiglu_limit: 10.0                         # clamped SwiGLU (FP4/FP8 stability)
activation_func_clamp_value: 10.0          # clamp swiglu parameter (Megatron config field)
bias_swiglu_fusion: false                   # fused path lacks clamp; revisit in perf phase
v4_grouped_experts_support_clamped_swiglu: true  # grouped (TEGroupedMLP) backend honors the clamped SwiGLU above (training sets this too)

# ---------- Parallelism defaults ----------
expert_model_parallel_size: 1
expert_tensor_parallel_size: null
