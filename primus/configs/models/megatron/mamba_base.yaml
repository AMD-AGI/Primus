extends:
  - language_model.yaml

# Mamba-specific configuration
# Note: Mamba-specific parameters (spec, is_hybrid_model, mamba_state_dim, etc.)
# must be set in the pretrain config overrides, not here

model_type: mamba
use_legacy_models: false

# Position embeddings - Mamba typically doesn't use position embeddings
position_embedding_type: rope
use_rotary_position_embeddings: false

# Tokenizer (should be set in specific model configs)
tokenizer_type: HuggingFaceTokenizer
tokenizer_model: null

# Standard transformer settings that may be used by hybrid models
is_hybrid_model: false
hybrid_attention_ratio: 0.0
hybrid_mlp_ratio: 0.0
hybrid_override_pattern: null
attention_dropout: 0.0
hidden_dropout: 0.0

# Embeddings
untie_embeddings_and_output_weights: false

# Other settings
apply_residual_connection_post_layernorm: false
add_bias_linear: false
swiglu: false

# Normalization
norm_epsilon: 1.0e-5

# Initialization
init_method_std: 0.02

# -----------------------------------------------------------------------------
# FLA runtime knobs (consumed by primus.backends.megatron.patches.fla_runtime
# patch which re-exports them as PRIMUS_FLA_* / PRIMUS_FUSED_CE* env vars).
#
# All are `null` here so the patch is a no-op for models that do not set any
# of them; per-model YAMLs (or experiment `overrides:` blocks) can override
# individual fields without having to re-declare the whole set.  See
# primus/backends/megatron/patches/fla_runtime_patches.py for the full
# precedence rules (launcher env var > YAML > documented default).
# -----------------------------------------------------------------------------
use_fla_fused_swiglu: null        # bool   — PRIMUS_FLA_SWIGLU      (default 1)
use_fla_fused_rmsnorm: null       # bool   — PRIMUS_FLA_NORM        (default 0)
use_fla_fused_gated_norm: null    # bool   — also PRIMUS_FLA_NORM   (default 0)
use_fla_short_conv: null          # bool   — PRIMUS_FLA_CONV        (default 0)
use_fla_data: null                # bool   — PRIMUS_FLA_DATA        (default 0)
fla_cache_dir: null               # path   — PRIMUS_FLA_CACHE_DIR   (default "")
fused_ce_mode: null               # 0/1/2  — PRIMUS_FUSED_CE        (default 1)
fused_ce_chunks: null             # int    — PRIMUS_FUSED_CE_CHUNKS (default 32)
fla_mla_attn: null                # str    — PRIMUS_FLA_MLA_ATTN    (default unset)
