model:
  name: wan
  config:
    load_from_pretrained_path: ${PRETRAINED_PATH:/models/Wan2.1-T2V-1.3B}
    config:
      model_type: t2v
      seperated_timestep: false
      fuse_vae_embedding_in_latents: false
      trainable_modules: dit
      vae_type: wan_video_vae
    encoder:
      t5_encoder: ${TEXT_ENCODER:/models/Wan2.1-T2V-1.3B/models_t5_umt5-xxl-enc-bf16.pth}
      autoencoder: ${VAE_CHECKPOINT:/models/Wan2.1-T2V-1.3B/Wan2.1_VAE.pth}
