# Dataset Configuration for Pre-encoded NumPy Diffusion Data (MLPerf format)
#
# This file is auto-generated by finalize_energon_dataset(encoding="preencoded_numpy")
# and placed in <dataset>/.nv-meta/dataset.yaml.
#
# Data format: numpy-serialized bfloat16 tensors stored as .bytes entries
# in WebDataset tar shards. Each sample contains:
#   - t5.bytes:   T5 text embeddings (numpy uint16, viewed as bfloat16)
#   - clip.bytes: CLIP pooled embeddings (numpy uint16, viewed as bfloat16)
#   - mean.bytes: VAE posterior mean (numpy uint16, viewed as bfloat16)
#   - logvar.bytes: VAE posterior log-variance (numpy uint16, viewed as bfloat16)

__module__: megatron.energon
__class__: CrudeWebdataset
subflavors:
  encoding: preencoded_numpy
