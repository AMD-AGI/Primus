# NeMo AutoModel pre_trainer module config — Ideogram-4 single-stream
# rectified-flow T2I pretrain (Primus backend: nemo_automodel).
#
# Sibling of `flux_pre_trainer.yaml` (the FLUX T2I preset) and `pre_trainer.yaml`
# (the Wan2.2 video preset): same recipe schema, wired for Ideogram-4:
#   - data.dataloader -> SyntheticIdeogram4DataloaderConfig (no-fork Primus loader;
#     emits image_latents [B,128,H_p,W_p] + llm_features [B,·,53248] + text_lengths).
#     Swap for the real Flux-2 VAE + Qwen3-VL preprocessor cache loader in Phase B.3.
#   - flow_matching.adapter_type -> ideogram4 (routed to Ideogram4Adapter by the
#     no-fork `ideogram4_adapter.install()` hook; packs the [pad][text][image]
#     sequence, maps sigma->t=1-sigma, negates the DiT velocity).
#
# The Primus launcher deep-merges the `model:` preset (ideogram4.yaml) and the
# EXP `overrides:` on top of this, then runs TrainDiffusionRecipe.
#
# NOTE: do not declare a `model:` block here — it comes from the model preset.
extends:
  - ../module_base.yaml

seed: 42

wandb:
  enable: false

dist_env:
  backend: nccl
  timeout_minutes: 30

step_scheduler:
  global_batch_size: 16
  local_batch_size: 2
  ckpt_every_steps: 1000
  num_epochs: 1000
  log_every: 1
  save_checkpoint_every_epoch: false

data:
  dataloader:
    _target_: primus.backends.nemo_automodel.ideogram_synthetic_data.SyntheticIdeogram4DataloaderConfig
    # Fixed (deterministic) synthetic cache for the from-config overfit smoke.
    num_samples: 64
    in_channels: 128
    grid_h: 16
    grid_w: 16
    max_text_tokens: 32
    min_text_tokens: 28
    llm_features_dim: 53248
    feature_scale: 0.1
    latent_scale: 1.0
    seed: 1234
    shuffle: true
    drop_last: false
    num_workers: 0
    pin_memory: true

optim:
  learning_rate: 1e-4
  optimizer:
    _target_: torch.optim.AdamW
    weight_decay: 0.01
    betas: [0.9, 0.999]
    # fused AdamW (mutually exclusive with foreach).
    foreach: false
    fused: true

performance:
  check_loss: false
  grad_clip_foreach: true

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 0
  min_lr: 1e-6

flow_matching:
  adapter_type: ideogram4
  adapter_kwargs:
    in_channels: 128
    predict_negative_velocity: true
  timestep_sampling: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 3.0
  mix_uniform_ratio: 0.1
  # Overfit smoke: no CFG dropout so every sample keeps its distinct conditioning.
  cfg_dropout_prob: 0.0
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  use_loss_weighting: false
  log_interval: 100
  summary_log_interval: 10

fsdp:
  tp_size: 1
  cp_size: 1
  pp_size: 1
  dp_replicate_size: 1
  # dp_size intentionally unset: AutoModel derives it from world size and the
  # parallel dims. Pin `dp_size: <n>` via overrides only to force a value.
  defer_fsdp_grad_sync: true
  enable_fsdp2_prefetch: true
  fsdp2_backward_prefetch_depth: 3
  fsdp2_forward_prefetch_depth: 2
  reduce_dtype: bfloat16
  # torch.compile off for the first Ideogram integration run (provisional; flip on
  # once compile is validated for Ideogram4Transformer2DModel).
  enable_compile: false
  # Real activation checkpointing requires PRIMUS_IDEOGRAM_REAL_AC=1 in the launch
  # env (registers the Ideogram parallelization strategy); otherwise this is a
  # silent no-op for Ideogram (same as FLUX).
  activation_checkpointing: true

checkpoint:
  enabled: false
  checkpoint_dir: /checkpoints/ideogram4_primus_pretrain
  model_save_format: safetensors
  save_consolidated: final
  diffusers_compatible: true
  restore_from: null
