# NeMo AutoModel pre_trainer module config — FLUX.1 T2I rectified-flow pretrain
# (Primus backend: nemo_automodel).
#
# Sibling of `pre_trainer.yaml` (the Wan2.2 video preset). Same recipe schema and
# the SAME optimized knobs (torch.compile + bf16 grad-reduce + deep prefetch +
# fused AdamW), but wired for FLUX text-to-IMAGE:
#   - data.dataloader -> build_text_to_image_multiresolution_dataloader
#     (the image loader takes NO `model_type`, unlike the video loader).
#   - flow_matching.adapter_type -> flux (guidance-embed conditioning).
#
# The Primus launcher deep-merges the `model:` preset (flux_1_dev.yaml) and the
# EXP `overrides:` on top of this, then runs TrainDiffusionRecipe.
#
# NOTE: do not declare a `model:` block here — it comes from the model preset.
extends:
  - ../module_base.yaml

seed: 42

wandb:
  enable: false

dist_env:
  backend: nccl
  timeout_minutes: 30

step_scheduler:
  global_batch_size: 32
  local_batch_size: 4
  ckpt_every_steps: 1000
  num_epochs: 1000
  log_every: 2
  save_checkpoint_every_epoch: false

data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_text_to_image_multiresolution_dataloader
    cache_dir: /dataset
    train_text_encoder: false
    # Supported cache resolutions: [256,256], [512,512], [1024,1024].
    base_resolution: [512, 512]
    dynamic_batch_size: false
    shuffle: true
    drop_last: false
    num_workers: 2

optim:
  learning_rate: 2e-5
  optimizer:
    _target_: torch.optim.AdamW
    weight_decay: 0.01
    betas: [0.9, 0.999]
    # fused AdamW (mutually exclusive with foreach).
    foreach: false
    fused: true

performance:
  check_loss: false
  grad_clip_foreach: true

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 0
  min_lr: 1e-6

flow_matching:
  adapter_type: flux
  adapter_kwargs:
    # Critical: guidance_scale 1 for pretraining. The FluxAdapter ALWAYS passes a
    # guidance tensor, so FLUX.1-dev's transformer (guidance_embeds=true) is required.
    guidance_scale: 1
    use_guidance_embeds: true
  timestep_sampling: uniform
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 1.0
  mix_uniform_ratio: 0.1
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  # Critical: use_loss_weighting must be false for pretraining.
  use_loss_weighting: false
  log_interval: 100
  summary_log_interval: 10

fsdp:
  tp_size: 1
  cp_size: 1
  pp_size: 1
  dp_replicate_size: 1
  # dp_size intentionally unset: AutoModel derives it from world size and the
  # parallel dims. Pin `dp_size: <n>` via overrides only to force a value.
  defer_fsdp_grad_sync: true
  enable_fsdp2_prefetch: true
  fsdp2_backward_prefetch_depth: 3
  fsdp2_forward_prefetch_depth: 2
  reduce_dtype: bfloat16
  enable_compile: true
  activation_checkpointing: true

checkpoint:
  enabled: false
  checkpoint_dir: /checkpoints/flux_primus_pretrain
  model_save_format: safetensors
  save_consolidated: final
  diffusers_compatible: true
  restore_from: null
