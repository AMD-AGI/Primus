# NeMo AutoModel pre_trainer module config — Ideogram-4 single-stream
# rectified-flow T2I pretrain on a REAL pre-encoded cache (Primus backend).
#
# Phase B.3 sibling of `ideogram4_pre_trainer.yaml` (the synthetic-cache smoke):
# identical recipe/optimizer/FSDP wiring, but `data.dataloader` points at the real
# Flux-2 VAE + Qwen3-VL preprocessor cache produced by
# `scripts/ideogram4_preprocess.py` and read by `Ideogram4CacheDataloaderConfig`
# (emits image_latents [B,128,gh,gw] + LEFT-padded llm_features [B,·,53248] +
# text_lengths). A dedicated preset (not an override of the synthetic one) so no
# synthetic-only dataloader keys leak through the deep-merge into the cache dataclass.
#
# NOTE: do not declare a `model:` block here — it comes from the model preset.
extends:
  - ../module_base.yaml

seed: 42

wandb:
  enable: false

dist_env:
  backend: nccl
  timeout_minutes: 30

step_scheduler:
  global_batch_size: 16
  local_batch_size: 2
  ckpt_every_steps: 1000
  num_epochs: 1000
  log_every: 1
  save_checkpoint_every_epoch: false

data:
  dataloader:
    _target_: primus.backends.nemo_automodel.ideogram_cache_data.Ideogram4CacheDataloaderConfig
    # Pre-encoded Ideogram-4 cache dir (override per run in the EXP).
    cache_dir: /mnt/m2m_nobackup/datasets/pcam_ideogram4_256
    shuffle: true
    drop_last: true
    num_workers: 2
    pin_memory: true

optim:
  learning_rate: 1e-4
  optimizer:
    _target_: torch.optim.AdamW
    weight_decay: 0.01
    betas: [0.9, 0.999]
    foreach: false
    fused: true

performance:
  check_loss: false
  grad_clip_foreach: true

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 0
  min_lr: 1e-6

flow_matching:
  adapter_type: ideogram4
  adapter_kwargs:
    in_channels: 128
    predict_negative_velocity: true
  timestep_sampling: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 3.0
  mix_uniform_ratio: 0.1
  # Real-data loss-decrease validation: no CFG dropout for a clean signal. A real
  # pretrain should set ~0.1 to train the unconditional branch.
  cfg_dropout_prob: 0.0
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  use_loss_weighting: false
  log_interval: 100
  summary_log_interval: 10

fsdp:
  tp_size: 1
  cp_size: 1
  pp_size: 1
  dp_replicate_size: 1
  defer_fsdp_grad_sync: true
  enable_fsdp2_prefetch: true
  fsdp2_backward_prefetch_depth: 3
  fsdp2_forward_prefetch_depth: 2
  reduce_dtype: bfloat16
  enable_compile: false
  # Real AC requires PRIMUS_IDEOGRAM_REAL_AC=1 in the launch env (else no-op).
  activation_checkpointing: true

checkpoint:
  enabled: false
  checkpoint_dir: /checkpoints/ideogram4_pcam_pretrain
  model_save_format: safetensors
  save_consolidated: final
  diffusers_compatible: true
  restore_from: null
