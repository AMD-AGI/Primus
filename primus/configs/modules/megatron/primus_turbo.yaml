# ===== Global =====
# main control flag
enable_primus_turbo: false
# use primus_turbo_fp4_autocast instead of TE fp8_autocast for FP4 (requires enable_primus_turbo)
use_turbo_fp4_autocast: false

# ===== MXFP4 Weight De-oscillation =====
# Snap weight elements whose MXFP4-quantized value oscillates while the fp32
# master barely moves (improves MXFP4 training convergence). Requires
# fp4 + use_turbo_fp4_autocast + use_distributed_optimizer.
weight_deosc: false
# optimizer steps per observe/reset window
weight_deosc_period: 200
# DistRatio threshold (dist_w_qdq / dist_w) above which an element is snapped
weight_deosc_ratio: 4.0
# global optimizer step at which de-oscillation tracking starts
weight_deosc_start_step: 0
# log a summary every N periods (0 disables logging)
weight_deosc_log_freq: 0

# ===== Attention =====
# operator switch
use_turbo_attention: false
# sink attention settings (PR 208) - GPT-OSS style learned sinks
# reference: gpt-oss/gpt_oss/triton/attention.py
use_sink_attention: false
# sliding window size for sink attention (gpt-oss uses 128)
sink_sliding_window: 0
# apply sliding window only to even layers (gpt-oss pattern)
sink_window_even_layers_only: true
# attention float8 path
enable_turbo_attention_float8: false

# ===== Parallel Linear =====
# operator switch
# use turbo gemm
use_turbo_gemm: false

# ===== Permute =====
use_turbo_permute_padding: false

# ===== Grouped MLP =====
# use turbo grouped gemm
use_turbo_grouped_gemm: false
# fused activation_with_probs to reduce redundant computation
use_turbo_fused_act_with_probs: false

# ===== MoE Router =====
moe_use_fused_router_with_aux_score: false

# ===== DeepEP =====
# operator switch
use_turbo_deepep: false
turbo_deepep_num_cu: 32
turbo_deepep_use_comm_stream: false

# ===== Sync-Free MoE =====
turbo_sync_free_moe_stage: 0

# ===== Layer Norm =====
# operator switch
use_turbo_rms_norm: false
