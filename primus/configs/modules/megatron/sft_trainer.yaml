# Megatron-LM SFT Trainer Configuration
# This configuration file defines the base settings for supervised fine-tuning
# using direct Megatron-LM integration (without Megatron-Bridge)

extends:
  - trainer_base.yaml

stage: sft

# Training iterations and batch size
train_iters: 1000
global_batch_size: 128
micro_batch_size: 1

# Evaluation settings
eval_iters: 10
eval_interval: 50

# Sequence length
seq_length: 2048

# Data loading
num_workers: 8
split: null
dataloader_type: cyclic

# Checkpoint settings
finetune: true
save_interval: 100
log_interval: 1
tensorboard_log_interval: 1
log_throughput: true
log_timers_to_tensorboard: true
log_batch_size_to_tensorboard: true
log_learning_rate_to_tensorboard: true

# Checkpoint format settings
# auto_detect_ckpt_format: Automatically detect checkpoint format during loading
# This is essential for loading HuggingFace converted checkpoints
auto_detect_ckpt_format: true
ckpt_format: torch_dist
fully_parallel_save: true

# Learning rate (lower than pretraining for fine-tuning)
lr: 1.0e-5
min_lr: 0.0
lr_decay_iters: null
lr_warmup_iters: 50
lr_decay_style: cosine

# Optimizer settings
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.95
override_opt_param_scheduler: true

# Attention and distributed settings
use_flash_attn: true
distributed_timeout_minutes: 60
use_distributed_optimizer: true

# SFT-specific settings
# Note: These are typically overridden in the experiment config
sft_dataset_name: "tatsu-lab/alpaca"
sft_conversation_format: "alpaca"
# HuggingFace dataset split to load. Some datasets have no "train" split (e.g.
# SWE-bench/SWE-smith-trajectories use tool/xml/ticks); override here.
sft_dataset_split: "train"

# Sequence packing: concatenate multiple short samples into a single
# max_seq_length sequence. Big throughput win on short-sample datasets such
# as Alpaca (~80 tokens per sample at seq_length=2048).
enable_packed_sequences: false

# When packing is enabled, this flag controls whether the model is forwarded
# with PackedSeqParams(qkv_format='thd', cu_seqlens=...) so that attention is
# strictly isolated across packed sub-samples.
#   true  -> "correct" varlen attention via TE / FlashAttention thd kernel.
#            Requires a backend that supports thd; ROCm + aiter currently
#            hangs / SIGABRTs in the first forward, so DO NOT enable on AMD
#            until that backend is fixed.
#   false -> implicit multi-turn regime: attention is plain causal across the
#            whole packed sequence (sub-samples can see each other), but the
#            loss_mask still restricts the loss to response tokens. This is
#            what LLaMA-Factory / TRL ship as their default packing path; the
#            accuracy hit is small and throughput goes up roughly 20x on
#            short-sample datasets.
use_packed_attention: false

# === LB-Mini (ODC sequence-length load balancing) ===
# When true (and enable_odc=true + use_torch_fsdp2=true), the TRAIN data is
# served variable-length and Karmarkar-Karp balanced across DP ranks, and each
# rank runs its OWN (possibly different) number of micro-batches -- removing the
# workload-imbalance bubble on variable-length datasets (e.g. LongAlign).
# Requires ODC point-to-point comm; it would deadlock under NCCL collectives.
# DEFAULT false => stock Megatron fixed-num_microbatches, all-ranks-in-lockstep
# schedule, byte-for-byte unchanged.
enable_odc_lb_mini: false
# Per-micro-batch token cap for LB-Mini (0 => use seq_length).
lb_mini_max_token_len: 0
# LB-Mini cost model: "linear" (token count) or "fit" (attention-aware, ~s^2).
lb_mini_cost_model: "linear"

# === Chunked linear cross-entropy (avoid full-logits OOM) ===
# When true (or env FUSED_LINEAR_CE=1), GPTModel computes the LM loss in
# sequence chunks under activation checkpointing, so the full [seq, vocab]
# logits is never materialized. Essential for large-vocab models (e.g. Qwen
# 151936) at long sequence lengths where the logits tensor alone would OOM.
# DEFAULT false => stock full-logits path, byte-for-byte unchanged. Numerically
# equivalent when on. Tune chunk via env FUSED_CE_CHUNK (default 4096).
enable_fused_linear_ce: false

# Opt-in: reproduce NeMo Megatron-Bridge's packed dataset byte-for-byte.
#
# When False (default) Native does a clean single-shot tokenize of the full
# prompt+answer string (one BOS at sequence start) and applies
# first_fit_decreasing packing (long samples cluster into the first packs).
# On Llama-2 70B + SQuAD this yields iter-1 lm-loss ~0.15.
#
# When True we flip Native into Bridge-parity mode along both dimensions:
#   1. Per-segment tokenize -> inline BOS in front of every supervised
#      answer span + trailing EOS. Mirrors NeMo Megatron-Bridge's
#      ``fill_packing_strategy`` + ``_separate_template`` loop, where each
#      independent ``text_to_ids`` call auto-prepends a BOS. The inline BOS
#      is OOD for Llama-2 and pushes iter-1 lm-loss into the ~4.x band.
#   2. first_fit_shuffle packing (seed = ``seed`` of the SFT dataset). Bridge
#      defaults to this in
#      ``megatron/bridge/data/datasets/packed_sequence.py`` L88. Random
#      traversal yields length-mixed packs (~20 short samples per pack)
#      instead of FFD's "all longest samples in pack 0", which is what made
#      iter-1 Native vs Bridge differ even after the BOS fix.
#
# Use this flag ONLY for numerical A/B benchmarking against Bridge runs.
sft_bridge_compat_inline_bos: false

# -----------------------------------------------------------------------------
# Benchmark robustness: NaN/Inf grad sanitizer
# -----------------------------------------------------------------------------
# When set to true, Primus monkey-patches Megatron's DDP
# ``ParamAndGradBucketGroup.check_grads`` so that any NaN/Inf entries in a
# grad bucket are replaced with 0 *before* the official NaN check. A NaN
# iteration then becomes a no-op step (Adam sees an all-zero grad slice for
# the affected bucket and skips that update) instead of raising a fatal
# RuntimeError that kills the run.
#
# Intended use case: benchmark configurations that intentionally use random
# routing via ``moe_router_force_load_balancing=true``. The combination of
# bf16 + grouped_gemm + LoRA + random routing can occasionally produce NaN
# grads, which kills long benchmark runs. With this flag on, the run keeps
# making progress and you still get end-to-end wall-clock / TFLOPS numbers.
#
# DO NOT enable this for standard pretrain / SFT recipes -- it silently
# hides numerical bugs you would otherwise want to know about.
sft_sanitize_nan_grads: false

# LoRA (Low-Rank Adaptation) settings
lora:
  enabled: false                   # Set true for parameter-efficient fine-tuning
  dim: 32                          # Low-rank dimension (8-64 typical)
  alpha: 32                        # Scaling factor (usually = dim)
  dropout: 0.0                     # Dropout rate (0.0-0.1)
  dropout_position: pre            # "pre" or "post"
  lora_A_init_method: xavier       # "xavier" or "kaiming"
  lora_B_init_method: zero         # "zero" (standard)
  target_modules:                  # Modules to apply LoRA
    - linear_qkv
    - linear_proj
    - linear_fc1
    - linear_fc2

# Note: ckpt_format and fully_parallel_save are already declared at the top of
# this file (lines 41-42). Duplicate declarations were removed here to satisfy
# yaml strict-mode parsers (e.g. ruamel.yaml) — value identical, behaviour
# unchanged.
