work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:llama3.2_1B-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}
modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: llama3.2_1B.yaml
    overrides:
      wandb_project: Primus_Pretrain
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50
      train_iters: 12
      micro_batch_size: 4
      global_batch_size: 32
      seq_length: 8192
      max_position_embeddings: 8192
      lr: 1.0e-05
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-06
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false
      mock_data: true
      train_data_path: null
      valid_data_path: null
      test_data_path: null
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      enable_primus_turbo: true
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      fp8: hybrid
      moe_use_legacy_grouped_gemm: false
      turbo_deepep_num_cu: 96
      profile: true
      use_pytorch_profiler: true
      profile_step_start: 5
      profile_step_end: 6
      profile_ranks:
      - 0
      tensorboard_dir: /shared/amdgpu/home/xiaoming_peng_qle/workspace/Primus/pilot/pilot/state/runs/real_e2e_escape_demo_r4_c5_0fce9df6/profile/tb
      torch_profiler_use_gzip: true
      torch_profiler_record_shapes: false
      torch_profiler_with_stack: false
      disable_profiler_activity_cpu: false
