work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:deepseek_v2_lite-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}
modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: ${PRIMUS_MODEL:deepseek_v2_lite}.yaml
    overrides:
      wandb_project: Primus_DeepSeek_Pretrain
      stderr_sink_level: DEBUG
      moe_router_force_load_balancing: true
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50
      train_iters: 20
      micro_batch_size: 14
      global_batch_size: 896
      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}
      lr: 1.0e-05
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-06
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: ${PRIMUS_PP:1}
      expert_model_parallel_size: ${PRIMUS_EP:8}
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null
      multi_latent_attention: true
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0
      enable_primus_turbo: true
      use_turbo_attention: true
      use_turbo_grouped_mlp: true
      use_turbo_deepep: true
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32
      turbo_deepep_num_cu: 64
      turbo_deepep_use_comm_stream: true
      turbo_sync_free_moe_stage: 2
      cross_entropy_fusion_impl: te
      cross_entropy_loss_fusion: true
      fp8: e4m3
      fp8_recipe: tensorwise
      profile: true
      use_pytorch_profiler: true
      profile_step_start: 5
      profile_step_end: 6
      profile_ranks:
      - 0
      tensorboard_dir: /shared/amdgpu/home/xiaoming_peng_qle/workspace/Primus/pilot/pilot/state/runs/dsv2_lite_fp8_mi355x_20260511T024914Z_r1_c1_bd2e3996/profile/tb
      torch_profiler_use_gzip: true
      torch_profiler_record_shapes: false
      torch_profiler_with_stack: false
      disable_profiler_activity_cpu: false
