# Primus CLI System Default Configuration
# This file provides system-wide default settings for Primus CLI
#
# Priority: CLI args > User config (~/.primus.yaml) > System defaults (this file)

# Main settings (apply to all modes)
main:
  debug: false
  dry_run: false

# Slurm-specific settings
slurm:
  debug: false
  dry_run: false
  # partition: ""
  nodes: 1
  gpus_per_node: 8
  time: "4:00:00"

# Container-specific settings
container:
  debug: false
  dry_run: false
  image: "rocm/primus:v25.9_gfx942"

  # Docker/Podman runtime options
  options:
    # Single-value options (passed as --key value)
    ipc: "host"
    network: "host"
    cpus: "32"
    memory: "256G"
    name: "primus-training"
    privileged: "true"
    security-opt: "seccomp=unconfined"
    group-add: "video"

    # Mount points (host:container or host path)
    # Each mount will be passed as --volume
    mounts: []
    # mounts:
    #   - "/data:/data"
    #   - "/output:/output"
    #   - "/workspace/Primus"
    #   - "/model_weights:/model_weights:ro"

    # Device access (each passed as --device)
    devices:
      - "/dev/kfd"
      - "/dev/dri"
      - "/dev/infiniband"

    # Capabilities (each passed as --cap-add)
    capabilities:
      - "SYS_PTRACE"
      - "CAP_SYS_ADMIN"

# Direct mode settings
direct:
  debug: false

  # Distributed training parameters
  gpus_per_node: 8
  master_port: 1234
  nnodes: 1
  master_addr: "localhost"

  # Direct mode specific options
  run_mode: "torchrun"
  script_path: "primus/cli/main.py"
  numa: "auto"
  log_file: ""

  # Default patch scripts and env vars
  patches: []
  env: []
