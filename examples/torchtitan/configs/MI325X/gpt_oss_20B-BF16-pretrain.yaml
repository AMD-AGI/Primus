work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:gpt_oss_20B-BF16-pretrain}
workspace: ./output

modules:
  pre_trainer:
    framework: torchtitan
    config: pre_trainer.yaml

    model: gpt_oss_20b.yaml
    overrides:
      metrics:
        log_freq: 1
        enable_wandb: false

      optimizer:
        name: "AdamW"
        lr: 2.2e-4
        eps: 1.0e-8

      lr_scheduler:
        warmup_steps: 10

      training:
        local_batch_size: 6
        seq_len: 4096
        max_norm: 1.0            # grad norm clipping
        steps: 50

      parallelism:
        data_parallel_replicate_degree: 1
        data_parallel_shard_degree: -1
        fsdp_reshard_after_forward: "default"  # default / never / always
        tensor_parallel_degree: 1
        pipeline_parallel_degree: 1
        expert_parallel_degree: 8
        expert_tensor_parallel_degree: 1

      activation_checkpoint:
        mode: "selective"        # ["none", "selective", "full"]
        selective_ac_option: "op"

      compile:
        enable: true
        components: ["model", "loss"]

      # Primus-Turbo on; GPT-OSS sink attention is installed by the
      # gptoss_sink_attention setup patch. BF16 (no fp8/mx).
      primus_turbo:
        enable_primus_turbo: true
        use_turbo_attention: true
        enable_attention_float8: false
        use_turbo_float8_linear: false
        use_turbo_mx_linear: false
        use_moe_fp8: false
        use_turbo_grouped_mm: false
        use_classic_attention: false
