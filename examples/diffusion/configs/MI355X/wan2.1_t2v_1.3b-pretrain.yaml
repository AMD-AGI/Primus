work_group: ${PRIMUS_TEAM:local}
user_name: ${PRIMUS_USER:local}
exp_name: ${PRIMUS_EXP_NAME:wan2.1_t2v_1.3b-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

platform:
  config: platform_local.yaml

modules:
  pre_trainer:
    framework: diffusion
    config: pre_trainer.yaml

    # Model preset to run.
    model: wan2.1_t2v_1.3b.yaml
    overrides:
      sink_level: null
      file_sink_level: DEBUG
      stderr_sink_level: INFO

      metrics:
        log_freq: 1
        enable_wandb: false

      training:
        local_batch_size: 1
        steps: ${MAX_STEPS:50}
        num_train_epochs: 1000
        gradient_accumulation_steps: 1
        output_dir: ${OUTPUT_DIR:./output/wan2.1_t2v_1.3b-pretrain}
        save_steps: 0
        run_name: wan2.1_t2v_1.3b-pretrain

      data:
        dataset_path: ${DATASET_PATH:/data/tiny-video-samples/meta.jsonl}
        data_folder: ${DATA_FOLDER:/data/tiny-video-samples/data}
        frame_num: 81
        video_backend: imageio
        text_tokenizer: ${TEXT_TOKENIZER:/models/Wan2.1-T2V-1.3B/google/umt5-xxl}
        height: 480
        width: 832

      parallelism:
        sp_size: ${SP_SIZE:1}
        dp_replicate: ${DP_REPLICATE:1}

      optimizer:
        lr: 1.0e-5
        weight_decay: 0.01

      runtime:
        attention_backend: ${ATTENTION_BACKEND:sdpa}
        report_to: none
