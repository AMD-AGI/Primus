# FLUX 12B-class diffusion pretrain on MI300X via Megatron-Bridge + Primus diffusion recipes.
# Launch (from Primus repo root, 8 GPUs example):
#   torchrun --nproc_per_node=8 -m primus.cli.main train pretrain \
#     --config examples/megatron_bridge/configs/MI300X/flux_12b_pretrain.yaml \
#     --backend-path /path/to/Megatron-Bridge
#
# Uses mock/synthetic data when dataset.path is null. For real data, set overrides below
# or pass CLI overrides (see Primus docs for override syntax).

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron_bridge
    config: diffusion_pretrain_trainer.yaml
    model: flux_12b_pretrain.yaml

    overrides:
      stderr_sink_level: DEBUG

      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      pipeline_dtype: null
      virtual_pipeline_model_parallel_size: null
      context_parallel_size: 1
      sequence_parallel: false
      use_megatron_fsdp: false

      train_iters: 10000
      global_batch_size: 16
      micro_batch_size: 1
      eval_interval: 2000
      save_interval: 2000

      lr: 1.0e-4
      min_lr: 0.0
      lr_warmup_iters: 1000
      lr_decay_iters: null

      wandb_project: null
      wandb_entity: null
      wandb_exp_name: null

      precision_config: bf16_mixed
      comm_overlap_config: null

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # Real Energon/WebDataset root (flat knob → dataset.path):
      # data_path: /path/to/prepared_flux_wds
