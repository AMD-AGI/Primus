work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:llama2_70b_lora_posttrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  post_trainer:
    framework: megatron_bridge
    config: sft_trainer.yaml

    # Model to run
    model: llama2_70b_lora.yaml

    overrides:
      stderr_sink_level: DEBUG
      # Parallelism configuration
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      pipeline_dtype: null
      virtual_pipeline_model_parallel_size: null
      context_parallel_size: 1
      sequence_parallel: false
      use_megatron_fsdp: false

      # Finetuning-specific params
      # Optional: Megatron base weights (required for PEFT). setup_llama2_70b_lora_training.sh appends a CLI override when it finds iter_* under <data>/megatron_checkpoints on the host.
      #pretrained_checkpoint: /data/megatron_checkpoints/Llama-2-70b-hf/iter_0000000
      peft: lora
      dataset_type: mlperf_dataset # can be squad or mlperf_dataset
      # for mlperf_dataset, you need to set the following parameters
      packed_sequence: true
      packed_train_data_path: ${PACKED_TRAIN_DATA_PATH:/data/train.npy}
      packed_val_data_path: ${PACKED_VAL_DATA_PATH:/data/validation.npy}
      packed_metadata_path: ${PACKED_METADATA_PATH:/data/packed_metadata.jsonl}

      # Training configuration
      train_iters: 1024
      global_batch_size: 8
      micro_batch_size: 1
      seq_length: 8192
      eval_interval: 48
      eval_iters: 24
      save_interval: null

      # Optimizer configuration
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1.0e-8
      weight_decay: 0.0001
      min_lr: 0.0
      lr: ${LR:0.0004}
      lr_warmup_iters: 0
      lr_decay_iters: 1024
      clip_grad: 0.3

      # W&B logging
      wandb_project: null
      wandb_entity: null
      wandb_exp_name: null

      # Precision
      precision_config: bf16_with_fp8_hybrid
      comm_overlap_config: null

      no_fp8_weight_transpose_cache: true
      cross_entropy_fusion_impl: "te"
  
      seed: ${SEED:1234}

      # tp_comm_overlap_rs: true
      # Turbo
      enable_primus_turbo: true
      use_turbo_attention: false
      # use_turbo_grouped_mlp: true
      use_turbo_rms_norm: false
      use_turbo_parallel_linear: false

      check_for_nan_in_loss: false

      # Backbone TE op fuser (fused MLP path). If LM/val loss diverges vs a known-good run, set false.
      use_transformer_engine_op_fuser: true
      # Single Primus knob: true = op fuser on backbone + unfused LoRA (stable loss). false = legacy (fused LoRA tracks backbone when TP=1).
      stable_lora_with_te_op_fuser: true
      # If stable_lora_with_te_op_fuser: false and use_transformer_engine_op_fuser: true, scope fused LoRA (wildcards like target_modules):
      # te_fused_lora_include_modules: ["*.linear_fc1", "*.linear_fc2"]
      # Or exclude attention linears from fusion (often enough to stabilize loss):
      # te_fused_lora_exclude_modules: ["linear_qkv", "linear_proj", "*self_attention*"]
