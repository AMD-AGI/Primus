# Primus EXP — Ideogram-4 single-stream T2I PRETRAIN on REAL data (Phase B.3).
# =============================================================================
# Same no-fork Primus path as `ideogram4-pretrain.yaml`, but trains on a REAL
# pre-encoded cache instead of the synthetic one:
#   - data.dataloader -> Ideogram4CacheDataloaderConfig
#     (primus/backends/nemo_automodel/ideogram_cache_data.py), reading the
#     Flux-2 VAE + Qwen3-VL 13-layer cache built by
#     scripts/ideogram4_preprocess.py (Ideogram4Processor).
#   - flow_matching.adapter_type: ideogram4 -> Ideogram4Adapter
#   - fsdp.activation_checkpointing + PRIMUS_IDEOGRAM_REAL_AC=1 -> real AC
# The DiT still builds from the weightless local config dir (random init, no gated
# transformer weights); only the DATA is real here.
#
# One-time cache build (inside container on the docker node, 1 GPU, HF token set):
#   HF_HOME=/mnt/m2m_nobackup/hf_cache python \
#     .../ttt_l2_02_IDEOGRAM/scripts/ideogram4_preprocess.py \
#     --image_dir  /shared_nfs/datasets/ttt_diffusion/pseudo-camera-10k/train \
#     --caption_dir /shared_nfs/datasets/ttt_diffusion/pseudo-camera-10k/caption \
#     --out_dir    /mnt/m2m_nobackup/datasets/pcam_ideogram4_256 \
#     --num_samples 1024 --resolution 256 --max_text_tokens 128
#
# Launch (inside container, 8 GPUs) — the wrapper script does this:
#   bash .../ttt_l2_02_IDEOGRAM/scripts/phase_b3_run.sh
#
# Goal: a clearly decreasing loss on 8-GPU FSDP2 bf16 (real AC) over REAL Ideogram-4
# conditioning — validating the processor + cache loader end to end.
work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:ideogram4-pretrain-pcam}
workspace: ./output

modules:
  pre_trainer:
    framework: nemo_automodel
    config: ideogram4_pre_trainer_pcam.yaml
    model: ideogram4.yaml

    overrides:
      step_scheduler:
        max_steps: 200           # real-data loss-decrease validation (remove for full run)
        local_batch_size: 2
        global_batch_size: 16    # 2 x dp8 (grad_acc = 1)
        log_every: 1
      optim:
        learning_rate: 1.0e-4
      fsdp:
        activation_checkpointing: true
        enable_compile: false
      data:
        dataloader:
          cache_dir: /mnt/m2m_nobackup/datasets/pcam_ideogram4_256
      checkpoint:
        enabled: false           # set true + checkpoint_dir for a real run
