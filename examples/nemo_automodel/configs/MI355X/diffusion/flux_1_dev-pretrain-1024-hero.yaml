# Primus EXP — FLUX.1-dev T2I PRETRAIN (from scratch), 1024x1024 HERO.
# =============================================================================
# The headline attention A/B point: at 1024x1024 the FLUX joint attention runs on
# 4096 image + 512 text = 4608 tokens, so attention is a large fraction of the
# step and the nondeterministic bf16 flash-attention backward
# (PRIMUS_ATTN_NONDETERMINISTIC=1) shows its throughput uplift. Activation
# checkpointing is ON — the long-sequence hero needs it.
#
# Data cache (1024x1024):
#   python -m tools.diffusion.preprocessing_multiprocess image \
#     --image_dir /dataset/pseudo-camera-10k/train \
#     --output_dir /dataset/pcam_flux_1024 \
#     --processor flux --model_name /models/FLUX.1-dev --resolution 1024
#
# Launch (inside the Primus container, 8 GPUs free):
#   USE_HIPBLASLT=1 TORCH_BLAS_PREFER_HIPBLASLT=1 HIP_FORCE_DEV_KERNARG=1 GPU_MAX_HW_QUEUES=6 \
#   GPUS_PER_NODE=8 \
#   EXP=examples/nemo_automodel/configs/MI355X/diffusion/flux_1_dev-pretrain-1024-hero.yaml \
#   bash examples/run_pretrain.sh
#
# A/B: run once as-is (baseline) and once with PRIMUS_ATTN_NONDETERMINISTIC=1 (best).
work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_1_dev-pretrain-1024-hero}
workspace: ./output

modules:
  pre_trainer:
    framework: nemo_automodel
    config: flux_pre_trainer.yaml
    model: flux_1_dev.yaml

    overrides:
      step_scheduler:
        max_steps: 40
        local_batch_size: 1
        global_batch_size: 8     # 1 x dp8
        log_every: 5
      fsdp:
        activation_checkpointing: true
      data:
        dataloader:
          cache_dir: /dataset/pcam_flux_1024
          base_resolution: [1024, 1024]
      checkpoint:
        enabled: false
