# SCRATCH (Phase-2 sharding sweep, delete after) — FLUX.1-dev 1024 hero DDP point.
# Uses _flux_ddp_pre_trainer.yaml (ddp: block instead of fsdp:) so the recipe
# takes the DistributedDataParallel path (full 12B replication, no sharding).
work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:_flux_1024_ddp}
workspace: ./output

modules:
  pre_trainer:
    framework: nemo_automodel
    config: _flux_ddp_pre_trainer.yaml
    model: flux_1_dev.yaml

    overrides:
      step_scheduler:
        max_steps: 20
        local_batch_size: 2
        global_batch_size: 16
        log_every: 1
      data:
        dataloader:
          cache_dir: /checkpoints/pcam_flux_1024_hero
          base_resolution: [1024, 1024]
      checkpoint:
        enabled: false
