work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:farskip-moonlight-pretrain}
workspace: ./output

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: ${PRIMUS_MODEL:kimi_moonlight}.yaml
    overrides:
      # log
      disable_wandb: true
      stderr_sink_level: DEBUG
      manual_gc: true
      manual_gc_interval: 100

      # farskip
      use_overlapped_farskip_layer: true
      farskip_overlap_associative_add: true
      use_simple_farskip_layer: false
      attn_only_farskip: false
      mlp_only_farskip: false

      # disable mtp
      mtp_num_layers: 0
      mtp_loss_scaling_factor: 0.0
      moe_shared_expert_overlap: false

      moe_router_force_load_balancing: true # for benchmarking
      moe_router_dtype: bf16
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 5

      train_iters: 50
      eval_iters: 0
      micro_batch_size: 4
      global_batch_size: 512
      seq_length: ${PRIMUS_SEQ_LENGTH:2048}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:2048}
      lr: 2.0e-4
      min_lr: 0
      lr_warmup_iters: 0
      lr_decay_style: linear
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.02

      # parallel
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: ${PRIMUS_PP:1}
      expert_model_parallel_size: ${PRIMUS_EP:8}
      overlap_grad_reduce: true
      overlap_param_gather: true

      # data
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null

      # fusion
      moe_permute_fusion: false
      gradient_accumulation_fusion: false
      moe_use_legacy_grouped_gemm: false
      # fused topk router with aux score
      moe_use_fused_router_with_aux_score: true
      # pad 192/128 for deepseek attention
      fused_padded_mla_attention: false

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch

      # Turbo
      enable_primus_turbo: true
      use_turbo_attention: true
      use_turbo_grouped_mlp: true

      # Cross entropy flags
      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true