work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:deepseek_v3-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

# The config below is tuned for 32N on MI355X

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # model to run
    model: ${PRIMUS_MODEL:deepseek_v3}.yaml
    overrides:
      # log
      wandb_project: "Primus_DeepSeek_Pretrain"
      stderr_sink_level: DEBUG

      # debug
      moe_router_force_load_balancing: true
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      # hyper parameters
      train_iters: 50
      micro_batch_size: ${PRIMUS_MBS:1}      # MAIDAS DSv3 64GPU FP8: MBS=1
      global_batch_size: ${PRIMUS_GBS:64}    # MAIDAS DSv3 64GPU FP8: GBS(NBS)=64
      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}
      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      # parallel
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: ${PRIMUS_PP:16}
      # MAIDAS DSv3 uses VPP=2 (interleaved) for high PP efficiency (~89.5%).
      # Set VPP explicitly (no layout string) so the 61 layers auto-distribute
      # across PP*VPP=32 virtual stages; avoids the layout/PP*VPP mismatch.
      num_virtual_stages_per_pipeline_rank: ${PRIMUS_VPP:2}
      expert_model_parallel_size: ${PRIMUS_EP:8}
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false

      # data
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null

      # MoE: standard Megatron grouped GEMM + all-to-all dispatch (aligned with mi455 old repo)
      moe_grouped_gemm: true
      moe_use_legacy_grouped_gemm: false
      moe_token_dispatcher_type: alltoall
      # MLA
      multi_latent_attention: true

      # optimizer
      use_precision_aware_optimizer: true
      main_grads_dtype: bf16
      exp_avg_dtype: bf16
      exp_avg_sq_dtype: bf16

      # rope fusion
      enable_experimental: true
      apply_rope_fusion: true

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0

      # Turbo/DeepEP disabled to align with mi455 old repo (vanilla Megatron MoE path).
      enable_primus_turbo: false
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      use_turbo_rms_norm: false

      # deepep disabled (using all-to-all token dispatch above)
      use_turbo_deepep: false
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32

      # sync-free moe disabled (0 = off; it would auto-enable DeepEP)
      turbo_sync_free_moe_stage: 0

      # Cross entropy flags
      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true

      # enable fp8 training
      fp8: hybrid
