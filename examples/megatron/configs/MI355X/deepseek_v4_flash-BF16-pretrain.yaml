work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:deepseek_v4_flash-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

# DeepSeek-V4 Flash BF16 pretraining config tuned for MI355X.
# This is a smoke / scaffold config — values (especially parallelism) will be
# revised once the V4 builder + hybrid attention land in Phase 3-5.

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    model: ${PRIMUS_MODEL:deepseek_v4_flash}.yaml
    overrides:
      # log
      wandb_project: "Primus_DeepSeek_V4_Pretrain"
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      # hyper parameters
      train_iters: 50
      micro_batch_size: 1
      global_batch_size: 256
      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}
      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      # parallel — scaffold defaults; will be retuned in Phase 6.
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: ${PRIMUS_PP:8}
      expert_model_parallel_size: ${PRIMUS_EP:8}
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: true

      # data
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null

      # ---------- DeepSeek-V4 specific ----------
      hybrid_attention_enabled: true
      attn_sink: true
      hc_use_sinkhorn: true
      mtp_use_separate_hc_head: true
      moe_router_score_function: sqrtsoftplus
      swiglu_limit: 10.0

      # ---------- Optimizer ----------
      # NOTE: Phase 7 will add Muon for the latent / hidden projections.
      #       Until then we run plain BF16 AdamW (precision-aware).
      use_precision_aware_optimizer: true
      main_grads_dtype: bf16
      exp_avg_dtype: bf16
      exp_avg_sq_dtype: bf16

      # rope fusion
      enable_experimental: true
      apply_rope_fusion: false   # V4 uses partial RoPE on a 512-dim head

      # recompute
      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0

      # turbo / deepep — keep off until V4 path is verified
      enable_primus_turbo: false
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      use_turbo_rms_norm: false
      use_turbo_deepep: false
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32

      moe_use_fused_router_with_aux_score: false
      moe_permute_fusion: true

      # Cross entropy flags
      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true
