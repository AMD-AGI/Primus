work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:qwen3_235B_A22B_4layer-sft}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  post_trainer:
    framework: megatron
    config: sft_trainer.yaml

    # Four-layer smoke-test model derived from Qwen3-235B-A22B.
    model: qwen3_235B_A22B_4layer.yaml

    overrides:
      stage: sft

      # Use the real Qwen3 tokenizer, but do not load/convert the full 235B checkpoint.
      tokenizer_model: Qwen/Qwen3-235B-A22B

      sft_dataset_name: "tatsu-lab/alpaca"
      sft_conversation_format: "alpaca"

      wandb_project: "Primus_Qwen3_235B_A22B_4Layer_SFT"
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 0
      log_avg_reset_interval: 10

      train_iters: 20
      micro_batch_size: 1
      global_batch_size: 8

      seq_length: 512
      max_position_embeddings: 512

      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 1
      lr_decay_iters: 2
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: false

      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 8
      context_parallel_size: 1
      sequence_parallel: false

      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false

      # Smoke test only: initialize randomly and verify the SFT train path.
      finetune: false
      load: null
      save: null
      save_interval: 100
      eval_interval: 100
      eval_iters: 0
      no_save_optim: true
      no_save_rng: true
      disable_last_saving: true
      ckpt_format: torch

      bf16: true

      enable_primus_turbo: true
      use_turbo_attention: false
      use_turbo_grouped_gemm: false

      use_turbo_deepep: true
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32
      turbo_deepep_num_cu: 64
      turbo_deepep_use_comm_stream: false
      turbo_sync_free_moe_stage: 1

      lora:
        enabled: true
        dim: 32
        alpha: 32
        dropout: 0.0
        dropout_position: pre
        lora_A_init_method: xavier
        lora_B_init_method: zero
        target_modules:
          - linear_qkv
          - linear_proj
          - linear_fc1
          - linear_fc2
