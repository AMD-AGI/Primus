work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
# Recommended invocation::
#
#   export PRIMUS_EXP_NAME=llama3_70b_native_aligned_$(date +%Y%m%d_%H%M%S)
#   EXP=examples/megatron/configs/MI355X/llama3_70B-BF16-sft-packed-bridge_aligned.yaml \
#       bash examples/run_pretrain.sh
exp_name: ${PRIMUS_EXP_NAME:llama3_70B-sft-packed-bridge_aligned}
workspace: ${PRIMUS_WORKSPACE:./output}

# =============================================================================
# Llama-3 70B LoRA SFT — NATIVE-PATH apples-to-apples baseline for the
# Bridge-vs-Native A/B benchmark (THIS YAML LIVES IN THE 0507 NATIVE PROJECT)
# =============================================================================
# Companion config (the Bridge side, lives in the 0509 project):
#   /home/botahu_qle/Primus_0509/Primus/examples/megatron_bridge/configs/MI355X/
#       llama3_70b_lora_posttrain_packed.yaml
#
# Aligned hyperparameters (must match Bridge llama3_70b PEFT recipe + AB yaml):
#   * Shape: mbs=1, gbs=128, seq=4096 (per-step tokens = 524 288)
#   * Parallelism: TP=8, PP=1, EP=1 (dense), CP=1, SP=false (Bridge default)
#   * LoRA dim=32, alpha=32, target=[qkv, proj, fc1, fc2]
#   * lr=1e-4, warmup=50, decay=950 (Bridge defaults)
#   * adam_beta2=0.98 (Bridge llama3 override of _peft_common's 0.95)
#   * seed=5678 (Bridge RNGConfig)
#   * Dataset: SQuAD with `squad` formatter (byte-identical prompt template)
#   * train_iters=20, eval skipped
#   * Primus Turbo + ROCm-only fused-kernels ALL forced OFF
# =============================================================================

modules:
  post_trainer:
    framework: megatron
    config: sft_trainer.yaml

    model: ${PRIMUS_MODEL:llama3_70B}.yaml

    overrides:
      stage: sft

      hf_path: meta-llama/Meta-Llama-3-70B
      tokenizer_model: meta-llama/Meta-Llama-3-70B

      sft_dataset_name: "rajpurkar/squad"
      sft_conversation_format: "squad"

      enable_packed_sequences: true
      use_packed_attention: false

      num_workers: 1
      dataloader_type: cyclic

      wandb_project: "Primus_Llama3_70B_SFT_Packed_Bridge_Aligned"
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 10

      train_iters: 20
      micro_batch_size: 1
      global_batch_size: 128

      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}

      # ---------- LR / SFT discipline ----------
      # Mirror Bridge AB yaml: warmup=10, decay=20 to honor Megatron's
      # hard assert `lr_warmup_steps < lr_decay_steps` while preserving
      # the cosine LR shape (ramp 0 → 1e-4 at iter 10, decay 1e-4 → 0
      # by iter 20). See 8B yaml header for the full rationale.
      lr: 1.0e-4
      min_lr: 0.0
      lr_warmup_iters: 10
      lr_decay_iters: 20
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      adam_eps: 1.0e-8

      seed: 5678

      eod_mask_loss: false

      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      # ---------- Parallelism: TP=8 (Bridge llama3_70b default) ----------
      tensor_model_parallel_size: ${PRIMUS_TP:}
      pipeline_model_parallel_size: ${PRIMUS_PP:1}
      expert_model_parallel_size: 1
      context_parallel_size: 1
      sequence_parallel: false

      # ---------- Optimizer / DDP (Bridge _peft_common defaults) ----------
      use_distributed_optimizer: false
      overlap_grad_reduce: false
      overlap_param_gather: false
      gradient_accumulation_fusion: true

      use_precision_aware_optimizer: false

      apply_rope_fusion: true

      # ---------- Checkpoint ----------
      finetune: true
      load: null
      save: null
      save_interval: 100
      eval_interval: 100
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch_dist

      bf16: true

      # =====================================================================
      # PRIMUS-TURBO + FUSED-KERNEL FAMILY: ALL FORCED OFF
      # =====================================================================
      enable_primus_turbo: false
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      use_turbo_rms_norm: false

      cross_entropy_fusion_impl: "native"
      cross_entropy_loss_fusion: false

      manual_gc: true
      manual_gc_interval: 100

      profile: true
      use_pytorch_profiler: true
      profile_step_start: 10
      profile_step_end: 11
      profile_ranks: [0]

      eval_iters: 0

      lora:
        enabled: true
        dim: 32
        alpha: 32
        dropout: 0.0
        dropout_position: pre
        lora_A_init_method: xavier
        lora_B_init_method: zero
        target_modules:
          - linear_qkv
          - linear_proj
          - linear_fc1
          - linear_fc2
