# Flux 12B Schnell Training — DDP + TE Spec + FP8 Delayed Scaling (MI355X)
#
# FP8 training using Megatron DDP + distributed optimizer with TransformerEngine
# modules and FP8 hybrid delayed scaling:
#   - Megatron DDP with overlap_grad_reduce + overlap_param_gather
#   - TEColumnParallelLinear / TERowParallelLinear / TEDotProductAttention / TENorm
#   - FP8 hybrid (E4M3 fwd, E5M2 bwd) with delayed scaling (amax history 1024)
#   - RoPE fusion via apply_rope_fusion: true
#   - Energon pre-encoded dataset
#
# Required environment variables for the TransformerEngine path (set before launch):
#   export NVTE_FUSED_ATTN=1
#   export NVTE_FUSED_ATTN_CK=1
#   export NVTE_FP8_DPA_BWD=1
#   export NVTE_USE_HIPBLASLT=1
#   export USE_HIPBLASLT=1
#   export TORCH_BLAS_PREFER_HIPBLASLT=1
#   export NVTE_USE_CAST_TRANSPOSE_TRITON=1

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_ddp_te_fp8}

workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: diffusion/flux_12b.yaml

    trainer_class: FluxPretrainTrainer

    overrides:
      model_type: flux_schnell

      # ==========================================
      # Flux Schnell training recipe
      # ==========================================
      timestep_sampling_strategy: "direct_uniform"
      activation_func: "openai_gelu"
      cfg_dropout_prob: 0.1

      vae_scale: 0.3611
      vae_shift: 0.1159
      vae_latent_mode: resample

      # ==========================================
      # RoPE Fusion
      # ==========================================
      rotary_interleaved: true
      apply_rope_fusion: true
      position_embedding_type: rope

      # ==========================================
      # TransformerEngine Spec
      # ==========================================
      transformer_impl: "transformer_engine"

      # ==========================================
      # FP8 — hybrid delayed scaling
      # ==========================================
      fp8: "hybrid"
      fp8_recipe: "delayed"
      fp8_margin: 0
      fp8_amax_history_len: 1024
      fp8_amax_compute_algo: "max"
      fp8_wgrad: true
      fp8_dot_product_attention: false
      fp8_multi_head_attention: false

      # ==========================================
      # Energon Dataset
      # ==========================================
      data_path: ${PRIMUS_DIFFUSION_DATA_PATH:/path/to/energon/dataset}

      # Training iterations (example value; increase for a full training run)
      train_iters: 1000
      eval_interval: 10000
      eval_iters: 0
      log_interval: 1
      save_interval: 10000

      # ==========================================
      # Batch Configuration
      # ==========================================
      # MI355X (256GB HBM3) fits the full MBS=64/GBS=512; tune to your hardware.
      micro_batch_size: 64
      global_batch_size: 512
      seq_length: 512

      # ==========================================
      # BF16 + FP8 Precision
      # ==========================================
      bf16: true
      fp16: false
      params_dtype: bfloat16
      grad_reduce_in_bf16: true

      # ==========================================
      # Optimizer
      # ==========================================
      optimizer: adam
      lr: 2.0e-4
      min_lr: 2.0e-4
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      clip_grad: 1.0

      lr_warmup_iters: 1600
      lr_decay_iters: 4000
      lr_decay_style: constant

      # DataLoader
      num_workers: 8
      dataloader_type: external
      max_samples_per_sequence: null

      # ==========================================
      # Megatron DDP + Distributed Optimizer
      # ==========================================
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 1

      use_torch_fsdp2: false
      use_megatron_fsdp: false

      use_distributed_optimizer: true
      overlap_grad_reduce: true
      overlap_param_gather: true
      overlap_param_gather_with_optimizer_step: false
      use_precision_aware_optimizer: false

      ddp_bucket_size: 256000000
      use_fsdp2_fp32_param_optimizer: false

      ckpt_format: torch_dist

      gradient_accumulation_fusion: false

      check_for_nan_in_loss_and_grad: true

      # ==========================================
      # Memory / Misc
      # ==========================================
      use_flash_attn: true
      empty_unused_memory_level: 0

      # Manual GC — align GC timing across ranks to avoid stragglers
      manual_gc: true
      manual_gc_interval: 1000

      distributed_timeout_minutes: 60
      distributed_backend: nccl

      # Checkpointing (disabled)
      finetune: false
      save: null
      load: null
      no_save_optim: true
      no_save_rng: true
      auto_continue_train: false
      disable_last_saving: true

      # Logging
      tensorboard_dir: output/tensorboard/flux_12b_ddp_te_fp8
      wandb_project: flux_12b_ddp_te_fp8
      log_throughput: true
      wall_clock_step_timer: true
      log_timers_to_tensorboard: true
      log_batch_size_to_tensorboard: true
      log_learning_rate_to_tensorboard: true
      log_memory_to_tensorboard: true

      # Profiler
      profile: false
      use_pytorch_profiler: true
      profile_ranks: [0]
      profile_step_start: 9
      profile_step_end: 11
      torch_profiler_record_shapes: true
      torch_profiler_with_stack: true
      torch_profiler_use_gzip: false
      disable_profiler_activity_cpu: false

      # Primus Turbo — disabled for pure TE path
      enable_primus_turbo: false
      use_turbo_attention: false

      seed: 2025
      te_rng_tracker: true

      # torch.compile — selective stack compilation for TE spec
      torch_compile:
        enable: true
        backend: "inductor"
        mode: "default"
        fullgraph: false
        compile_optimizer: false
        strategy: "stack"
        replace_qk_rmsnorm: true
        disable_inductor_cudagraphs: false
