# Flux 12B Schnell Training — DDP + TE Spec + FP8 Delayed Scaling (MLPerf Mode)
#
# NOTE: This is a benchmark-reproduction config for the MLPerf Training Flux.1
# benchmark. It mirrors MLPerf logging/convergence conventions and is intended
# for reproducing benchmark results, not as a general-purpose training starting
# point. For everyday FP8 training on the TransformerEngine path use
# flux_12b_ddp_energon_schnell_resample_te_spec_fp8.yaml.
#
# MLPerf-compliant variant of the TE spec FP8 config:
#   - mlperf_mode: true — enables MLPerf logging via mlperf_logging.mllog
#   - warmup_train_steps: 2 — synthetic data warmup for torch.compile + FP8
#   - target_val_loss: 0.586 — convergence target for early stopping
#   - DDP + distributed optimizer
#   - TransformerEngine modules with FP8 hybrid delayed scaling

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_ddp_te_fp8_mlperf}

workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: diffusion/flux_12b.yaml

    trainer_class: FluxPretrainTrainer

    overrides:
      model_type: flux_schnell

      # ==========================================
      # MLPerf Mode
      # ==========================================
      mlperf_mode: true
      warmup_train_steps: 2
      target_val_loss: 0.586

      # ==========================================
      # MLPerf Training v5.1 Alignment
      # ==========================================
      timestep_sampling_strategy: "direct_uniform"
      activation_func: "openai_gelu"
      cfg_dropout_prob: 0.1

      vae_scale: 0.3611
      vae_shift: 0.1159
      vae_latent_mode: resample

      # ==========================================
      # RoPE Fusion
      # ==========================================
      rotary_interleaved: true
      apply_rope_fusion: true
      position_embedding_type: rope

      # ==========================================
      # TransformerEngine Spec
      # ==========================================
      transformer_impl: "transformer_engine"
      adaln_plain_ops: true
      adaln_always_jit_fuser: true

      # ==========================================
      # FP8 — hybrid delayed scaling
      # ==========================================
      fp8: "hybrid"
      fp8_recipe: "delayed"
      fp8_margin: 0
      fp8_amax_history_len: 1024
      fp8_amax_compute_algo: "max"
      fp8_wgrad: true
      fp8_dot_product_attention: false
      fp8_multi_head_attention: false

      # ==========================================
      # DATA — Real Energon data (not mock)
      # ==========================================
      data_path: ${PRIMUS_DIFFUSION_DATA_PATH:/path/to/energon/dataset}
      mock_data: false
      dataloader_type: external
      num_workers: 8
      max_samples_per_sequence: null

      train_iters: 5000
      eval_interval: 512
      eval_iters: 10
      log_interval: 10
      save_interval: 10000

      # ==========================================
      # Batch Configuration
      # ==========================================
      micro_batch_size: 64
      global_batch_size: 512
      seq_length: 512

      # ==========================================
      # BF16 + FP8 Precision
      # ==========================================
      bf16: true
      fp16: false
      params_dtype: bfloat16
      grad_reduce_in_bf16: true

      # ==========================================
      # Optimizer (MLPerf v5.1)
      # ==========================================
      optimizer: adam
      lr: 2.0e-4
      min_lr: 2.0e-4
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      clip_grad: 1.0

      lr_warmup_iters: 1600
      lr_decay_iters: 4000
      lr_decay_style: constant

      # ==========================================
      # Megatron DDP + Distributed Optimizer
      # ==========================================
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 1

      use_torch_fsdp2: false
      use_megatron_fsdp: false

      use_distributed_optimizer: true
      overlap_grad_reduce: true
      overlap_param_gather: true
      overlap_param_gather_with_optimizer_step: false
      use_precision_aware_optimizer: false

      ddp_bucket_size: 256000000
      use_fsdp2_fp32_param_optimizer: false

      ckpt_format: torch_dist

      gradient_accumulation_fusion: false
      check_for_nan_in_loss_and_grad: false

      # ==========================================
      # Memory / Misc
      # ==========================================
      use_flash_attn: true
      empty_unused_memory_level: 0

      distributed_timeout_minutes: 60
      distributed_backend: nccl

      # Checkpointing (disabled for MLPerf)
      finetune: false
      save: null
      load: null
      no_save_optim: true
      no_save_rng: true
      auto_continue_train: false
      disable_last_saving: true

      # Logging — suppressed by mlperf_mode
      tensorboard_dir: null
      wandb_project: null
      log_throughput: false
      wall_clock_step_timer: true
      log_timers_to_tensorboard: false
      log_batch_size_to_tensorboard: false
      log_learning_rate_to_tensorboard: false
      log_memory_to_tensorboard: false

      # Profiler — disabled
      profile: false

      # Primus Turbo — disabled for pure TE path
      enable_primus_turbo: false
      use_turbo_attention: false

      seed: 2025
      te_rng_tracker: true
      # MLPerf-aligned per-step CUDA RNG reseed (defaults off elsewhere; MLPerf
      # reproduction must opt in for run-to-run determinism).
      per_step_rng_reseed: true

      # torch.compile — selective stack compilation for TE spec
      torch_compile:
        enable: true
        backend: "inductor"
        mode: "default"
        fullgraph: false
        compile_optimizer: false
        strategy: "stack"
        replace_qk_rmsnorm: true
        disable_inductor_cudagraphs: true
        emulate_precision_casts: false
