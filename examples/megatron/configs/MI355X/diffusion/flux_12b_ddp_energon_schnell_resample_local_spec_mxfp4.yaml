# Flux 12B Schnell Training — DDP + Local Spec + MXFP4 (MI355X)
#
# Combines Megatron DDP + distributed optimizer with the local spec provider
# (PrimusTurboMXFP4LocalSpecProvider) for MXFP4 block-scaled training.
#
# Key configuration:
#   - Megatron DDP with overlap_grad_reduce + overlap_param_gather
#   - PrimusTurboMXFP4LocalSpecProvider (NO TransformerEngine dependency)
#   - MXFP4 (E2M1 + E8M0 block-of-32 scales) via Primus Turbo + AITER
#   - Primus Turbo attention
#   - torch.compile enabled (per_block strategy, compatible with local spec)
#   - Energon pre-encoded dataset with stored VAE mean/logvar (resample mode)

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_ddp_local_mxfp4}

workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: diffusion/flux_12b.yaml

    trainer_class: FluxPretrainTrainer

    overrides:
      model_type: flux_schnell

      # ==========================================
      # Flux Schnell training recipe
      # ==========================================
      # Short LR warmup ramp over the first optimizer steps for stability.
      nemo_aligned_lr_warmup: true
      warmup_train_steps: 2

      timestep_sampling_strategy: "direct_uniform"
      activation_func: "openai_gelu"
      cfg_dropout_prob: 0.1

      # VAE latent normalization (required for resample mode)
      vae_scale: 0.3611
      vae_shift: 0.1159

      # Resample mode: re-draw latents from mean+logvar each step
      vae_latent_mode: resample

      # RoPE: must be interleaved to match Flux's EmbedND doubled-frequency layout
      rotary_interleaved: true

      # ==========================================
      # PrimusTurboMXFP4LocalSpecProvider
      # ==========================================
      transformer_impl: "local"

      # ==========================================
      # DATASET CONFIGURATION
      # ==========================================
      data_path: ${PRIMUS_DIFFUSION_DATA_PATH:/path/to/energon/dataset}

      # Training iterations (example value; increase for a full training run)
      train_iters: 1000
      eval_interval: 10000
      eval_iters: 0
      log_interval: 1
      save_interval: 10000

      # Batch configuration
      micro_batch_size: 64
      global_batch_size: 512
      seq_length: 512  # 256 img tokens + 256 text tokens (schnell)

      # ==========================================
      # BF16 + MXFP4 Precision
      # ==========================================
      bf16: true
      fp16: false
      params_dtype: bfloat16
      grad_reduce_in_bf16: true

      # Optimizer settings
      optimizer: adam
      lr: 2.0e-4
      min_lr: 2.0e-4
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      clip_grad: 1.0

      # Learning rate scheduler (warmup-hold, no decay)
      lr_warmup_iters: 1600
      lr_decay_iters: 4000
      lr_decay_style: constant

      # DataLoader settings
      num_workers: 8
      dataloader_type: external
      max_samples_per_sequence: null

      # ==========================================
      # Megatron DDP + Distributed Optimizer
      # ==========================================

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 1

      use_torch_fsdp2: false
      use_megatron_fsdp: false

      use_distributed_optimizer: true
      overlap_grad_reduce: true
      overlap_param_gather: true
      overlap_param_gather_with_optimizer_step: false
      use_precision_aware_optimizer: true
      main_params_dtype: fp32
      main_grads_dtype: bf16
      exp_avg_dtype: bf16
      exp_avg_sq_dtype: bf16

      ddp_bucket_size: 256000000
      use_fsdp2_fp32_param_optimizer: false

      ckpt_format: torch_dist

      gradient_accumulation_fusion: false

      check_for_nan_in_loss_and_grad: true

      # ==========================================
      # MXFP4 Configuration — Block-scaled via Primus Turbo + AITER
      # ==========================================

      use_flash_attn: true

      fp4: "mxfp4"
      fp4_recipe: "mxfp4"
      mxfp4_backward_precision: "mxfp4"  # "mxfp4" (pure) or "fp8" (hybrid)

      empty_unused_memory_level: 0

      distributed_timeout_minutes: 180
      distributed_backend: nccl

      # Checkpointing (disabled)
      finetune: false
      save: null
      load: null
      no_save_optim: true
      no_save_rng: true
      auto_continue_train: false
      disable_last_saving: true

      # Logging
      tensorboard_dir: output/tensorboard/flux_12b_ddp_local_mxfp4
      wandb_project: flux_12b_ddp_local_mxfp4
      log_throughput: true
      wall_clock_step_timer: true
      log_timers_to_tensorboard: true
      log_batch_size_to_tensorboard: true
      log_learning_rate_to_tensorboard: true
      log_memory_to_tensorboard: true

      # PyTorch Profiler
      profile: false
      use_pytorch_profiler: true
      profile_ranks: [0]
      profile_step_start: 9
      profile_step_end: 11
      torch_profiler_record_shapes: true
      torch_profiler_with_stack: true
      torch_profiler_use_gzip: false
      disable_profiler_activity_cpu: false

      # Primus Turbo Configuration
      enable_primus_turbo: true
      use_turbo_attention: true

      seed: 2025
      per_step_rng_reseed: false
      nemo_chimera_init: false

      # Torch Compile — compatible with MXFP4 local spec (per-module FP4)
      torch_compile:
        enable: true
        strategy: "per_block"
        backend: "inductor"
        mode: "default"
        fullgraph: false
        compile_optimizer: false
        emulate_precision_casts: false
        fused_ln_modulate: true
