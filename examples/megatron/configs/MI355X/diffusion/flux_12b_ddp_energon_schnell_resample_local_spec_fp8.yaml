# Flux 12B Schnell Training — DDP + Local Spec + FP8 Tensorwise (MI355X)
#
# Combines Megatron DDP + distributed optimizer with the local spec provider
# (PrimusTurboFloat8LocalSpecProvider) for FP8 tensorwise training.
#
# Key configuration:
#   - Megatron DDP with overlap_grad_reduce + overlap_param_gather
#   - PrimusTurboFloat8LocalSpecProvider (NO TransformerEngine dependency)
#   - FP8 hybrid tensorwise (per-module FP8 via Primus Turbo)
#   - Primus Turbo attention
#   - torch.compile enabled (per_block strategy, compatible with local spec + overlap)
#   - Energon pre-encoded dataset with stored VAE mean/logvar (resample mode)

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_ddp_local_fp8}

workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: diffusion/flux_12b.yaml

    trainer_class: FluxPretrainTrainer

    overrides:
      model_type: flux_schnell

      # ==========================================
      # Flux Schnell training recipe
      # ==========================================
      # Short LR warmup ramp over the first optimizer steps for FP8 stability.
      nemo_aligned_lr_warmup: true
      warmup_train_steps: 2

      timestep_sampling_strategy: "direct_uniform"
      activation_func: "openai_gelu"
      cfg_dropout_prob: 0.1

      # VAE latent normalization (required for resample mode)
      vae_scale: 0.3611
      vae_shift: 0.1159

      # Resample mode: re-draw latents from mean+logvar each step
      vae_latent_mode: resample

      # RoPE: must be interleaved to match Flux's EmbedND doubled-frequency layout
      rotary_interleaved: true

      # ==========================================
      # PrimusTurboFloat8LocalSpecProvider
      # ==========================================
      transformer_impl: "local"

      # ==========================================
      # DATASET CONFIGURATION
      # ==========================================
      data_path: ${PRIMUS_DIFFUSION_DATA_PATH:/path/to/energon/dataset}

      # Training iterations (example value; increase for a full training run)
      train_iters: 1000
      eval_interval: 10000
      eval_iters: 0
      log_interval: 1
      save_interval: 10000

      # Batch configuration
      micro_batch_size: 64
      global_batch_size: 512
      seq_length: 512  # 256 img tokens + 256 text tokens (schnell)

      # ==========================================
      # BF16 + FP8 Precision
      # ==========================================
      bf16: true
      fp16: false
      params_dtype: bfloat16
      grad_reduce_in_bf16: true

      # Optimizer settings
      optimizer: adam
      lr: 2.0e-4
      min_lr: 2.0e-4
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      clip_grad: 1.0

      # Learning rate scheduler (warmup-hold, no decay)
      lr_warmup_iters: 1600
      lr_decay_iters: 4000
      lr_decay_style: constant

      # DataLoader settings
      num_workers: 8
      dataloader_type: external
      max_samples_per_sequence: null

      # ==========================================
      # Megatron DDP + Distributed Optimizer
      # ==========================================

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 1

      use_torch_fsdp2: false
      use_megatron_fsdp: false

      use_distributed_optimizer: true
      overlap_grad_reduce: true
      overlap_param_gather: true
      overlap_param_gather_with_optimizer_step: false
      use_precision_aware_optimizer: true
      main_params_dtype: fp32
      main_grads_dtype: bf16
      exp_avg_dtype: bf16
      exp_avg_sq_dtype: bf16

      ddp_bucket_size: 256000000
      use_fsdp2_fp32_param_optimizer: false

      ckpt_format: torch_dist

      gradient_accumulation_fusion: false

      check_for_nan_in_loss_and_grad: true

      # ==========================================
      # FP8 Configuration — Tensorwise + Delayed FP8 via Primus Turbo
      # ==========================================

      use_flash_attn: true

      fp8: "hybrid"
      # TE-compatible unified form: fp8: hybrid + fp8_recipe: delayed selects
      # tensorwise FP8 with delayed scaling. Resolution path:
      # primus/backends/megatron/core/extensions/primus_turbo_float8_local.py
      # :: Float8{Column,Row}ParallelLinear._use_delayed_scaling.
      fp8_recipe: "delayed"
      fp8_margin: 0
      fp8_amax_history_len: 1024
      fp8_amax_compute_algo: "max"
      fp8_wgrad: true
      fp8_dot_product_attention: false
      fp8_multi_head_attention: false
      fp8_reduce_amax: true

      empty_unused_memory_level: 0

      distributed_timeout_minutes: 180
      distributed_backend: nccl

      # Checkpointing (disabled)
      finetune: false
      save: null
      load: null
      no_save_optim: true
      no_save_rng: true
      auto_continue_train: false
      disable_last_saving: true

      # Logging
      tensorboard_dir: output/tensorboard/flux_12b_ddp_local_fp8
      wandb_project: flux_12b_ddp_local_fp8
      log_throughput: true
      wall_clock_step_timer: true
      log_timers_to_tensorboard: true
      log_batch_size_to_tensorboard: true
      log_learning_rate_to_tensorboard: true
      log_memory_to_tensorboard: true

      # PyTorch Profiler
      profile: false
      use_pytorch_profiler: true
      profile_ranks: [0]
      profile_step_start: 9
      profile_step_end: 11
      torch_profiler_record_shapes: true
      torch_profiler_with_stack: true
      torch_profiler_use_gzip: false
      disable_profiler_activity_cpu: false

      # Primus Turbo Configuration
      enable_primus_turbo: true
      use_turbo_attention: true
      use_dual_fp8_output_projection: false

      seed: 2025
      per_step_rng_reseed: false
      nemo_chimera_init: false

      # Torch Compile — compatible with Float8 local spec (per-module FP8)
      torch_compile:
        enable: true
        strategy: "per_block"
        backend: "inductor"
        mode: "default"
        fullgraph: false
        compile_optimizer: false
        emulate_precision_casts: false
        fused_ln_modulate: true
