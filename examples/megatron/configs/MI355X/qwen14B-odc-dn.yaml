### [50-iter back-to-back comparison, fit group] thd=true + cost_model=fit.
### The only difference from deepseek1.5B-lbmini-cmp-linear.yaml: lb_mini_cost_model = fit.
### Purpose: under fully identical conditions (same 50 iters, profiling off, back-to-back serial runs),
### determine which of linear vs fit is better, eliminating the earlier noise from "different runs + only 20 iters".
### The two yamls are identical except for cost_model.
### The fit coefficients are the 1.5B fit from lb_mini_packing.py get_seq_costs_fit (1.982122/2.611821).

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:deepseek1.5B-lbmini-cmp-fit}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  post_trainer:
    framework: megatron
    config: sft_trainer.yaml

    model: qwen2.5_14B.yaml

    overrides:
      stage: sft

      hf_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
      tokenizer_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B

      sft_dataset_name: "zai-org/LongAlign-10k"
      sft_conversation_format: "messages"

      # P0 enabled: thd segmented attention (same as main config). Shared by both groups.
      enable_packed_sequences: true
      use_packed_attention: true
      # Variable for this group: fit cost model (attention-aware a*s^2+b*s, 1.5B coefficients).
      lb_mini_cost_model: fit

      wandb_project: "Primus_DeepSeek1.5B_LBMini_cmp"
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 100

      train_iters: 50
      micro_batch_size: 1
      global_batch_size: 16

      seq_length: 65536
      max_position_embeddings: 65536

      lr: 2.0e-6
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: 100
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95

      seed: 1234
      eod_mask_loss: false
      init_method_std: 0.008
      norm_epsilon: 1.0e-5
      add_qkv_bias: true
      apply_rope_fusion: false

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      sequence_parallel: false
      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      enable_fused_linear_ce: false

      use_torch_fsdp2: true
      use_megatron_fsdp: false
      use_distributed_optimizer: false
      overlap_grad_reduce: false
      overlap_param_gather: false
      gradient_accumulation_fusion: false

      finetune: true
      # Megatron checkpoint to warm-start from. Set PRETRAINED_CKPT to your own
      # converted DeepSeek-R1-Distill-Qwen-14B checkpoint dir; null trains from
      # the HF weights only.
      pretrained_checkpoint: ${PRETRAINED_CKPT:null}
      load: null
      save: null
      save_interval: 1000
      eval_interval: 1000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch_dist

      bf16: true

      enable_primus_turbo: false
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      use_turbo_rms_norm: false

      eval_iters: 0

      profile: false
      use_pytorch_profiler: true
      use_nsys_profiler: false
      profile_step_start: 8
      profile_step_end: 9
      profile_ranks: [0]
      pytorch_profiler_collect_shapes: true
      pytorch_profiler_collect_callstack: false
      pytorch_profiler_collect_chakra: false
      record_shapes: false
      record_memory_history: false
      nvtx_ranges: false

      lora:
        enabled: false
