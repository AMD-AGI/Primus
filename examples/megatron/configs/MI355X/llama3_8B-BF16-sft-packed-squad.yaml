work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:llama3_8B-sft-packed-squad}
workspace: ${PRIMUS_WORKSPACE:./output}

# =============================================================================
# Llama-3 8B SFT (WITH packing) on SQuAD via native Primus SFT
# =============================================================================
# SQuAD twin of llama3_8B-BF16-sft-packed.yaml. Used for the
# Primus-native vs Megatron-Bridge A/B benchmark. Hyperparameters kept
# IDENTICAL to llama3_8B-BF16-sft-packed.yaml; only the dataset is switched
# to rajpurkar/squad.
#
# Packing semantics (same as llama3_8B-BF16-sft-packed.yaml):
#   * enable_packed_sequences: true   -> PackedSFTDataset stitches multiple
#     SQuAD samples into one ~2048-token sequence with cu_seqlens metadata
#   * use_packed_attention: false     -> attention runs causal across the
#     whole packed sequence (implicit multi-turn). loss_mask still confines
#     loss to the response (answers.text[0]) only.
# =============================================================================

modules:
  post_trainer:
    framework: megatron
    config: sft_trainer.yaml

    model: llama3_8B.yaml

    overrides:
      stage: sft

      hf_path: NousResearch/Meta-Llama-3-8B
      tokenizer_model: NousResearch/Meta-Llama-3-8B

      sft_dataset_name: "rajpurkar/squad"
      sft_conversation_format: "squad"

      enable_packed_sequences: true
      use_packed_attention: false


      num_workers: 1
      dataloader_type: cyclic
      wandb_project: "Primus_Llama3_SFT_Packed_Bridge_AB"
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 10

      train_iters: 20
      micro_batch_size: 1
      global_batch_size: 128

      seq_length: 2048
      max_position_embeddings: 2048

      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 10
      lr_decay_iters: 20
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95

      seed: 5678
      eod_mask_loss: false

      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      sequence_parallel: false

      use_distributed_optimizer: true
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: true

      use_precision_aware_optimizer: false
      apply_rope_fusion: true

      finetune: true
      load: null
      save: null
      save_interval: 100
      eval_interval: 100
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: false
      ckpt_format: torch_dist
      dist_ckpt_strictness: log_all

      bf16: true

      enable_primus_turbo: false
      use_turbo_attention: false
      use_turbo_grouped_mlp: false
      use_turbo_rms_norm: false


      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true

      manual_gc: true
      manual_gc_interval: 100
      
      # =====================================================================
      # Profile (aligned to Bridge yaml: capture iter 11 only)
      # =====================================================================
      profile: true
      use_pytorch_profiler: true
      use_nsys_profiler: false
      profile_step_start: 10
      profile_step_end: 11
      profile_ranks: [0]
      pytorch_profiler_collect_shapes: true
      pytorch_profiler_collect_callstack: false
      pytorch_profiler_collect_chakra: false
      record_shapes: false
      record_memory_history: false
      nvtx_ranges: false

      eval_iters: 10

      lora:
        enabled: true
        dim: 32
        alpha: 32
        dropout: 0.0
        dropout_position: pre
        lora_A_init_method: xavier
        lora_B_init_method: zero
        target_modules:
          - linear_qkv
          - linear_proj
          - linear_fc1
          - linear_fc2
