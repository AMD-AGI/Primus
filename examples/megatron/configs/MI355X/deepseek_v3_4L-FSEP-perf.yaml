work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:dsv3-4L-fsep-perf}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # DSv3 architecture, 4 layers only (proxy for load imbalance + large FFN test)
    # Key dimensions: H=7168, moe_ffn_hidden_size=2048, 256 experts, TopK=8
    # Natural routing gives r=5~15 (device-limited, group_topk=4 per 8-GPU group)
    model: deepseek_v3.yaml
    overrides:
      stderr_sink_level: DEBUG

      # ── Reduce to 4 MoE layers to fit single node ──
      num_layers: 4
      moe_layer_freq: 1          # all 4 layers are MoE (skip dense prefix for simplicity)
      mtp_num_layers: 0          # disable MTP

      # ── Training schedule ──
      train_iters: 20
      micro_batch_size: 1
      global_batch_size: 8
      seq_length: 4096
      max_position_embeddings: 4096
      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-6
      log_interval: 1
      log_avg_skip_iterations: 0
      log_avg_reset_interval: 20

      # ── Parallelism ──
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 8
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false

      # ── Data ──
      mock_data: true
      train_data_path: null
      valid_data_path: null
      test_data_path: null

      # ── Model ──
      multi_latent_attention: true           # keep MLA (DSv3 signature)
      moe_use_legacy_grouped_gemm: false     # use turbo GroupedMLP (required for FSEP)
      moe_router_force_load_balancing: false # natural routing → real load imbalance

      # ── Checkpoint ──
      finetune: false
      auto_continue_train: false
      load: null
      save: null
      save_interval: 20000
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0

      # ── Turbo ──
      enable_primus_turbo: true
      use_turbo_attention: false
      use_turbo_grouped_mlp: false

      # ── DeepEP ──
      use_turbo_deepep: true
      moe_shared_expert_overlap: false
      moe_router_dtype: fp32
      turbo_deepep_num_cu: 64
      turbo_deepep_use_comm_stream: false
      turbo_sync_free_moe_stage: 1

      # ── FSEP Performance Test ──
      # Baseline (FSEP off):   comment out moe_fsep_sharding_degree below
      # FSEP on  (S=EP=8):     uncomment moe_fsep_sharding_degree: 8
      #
      # Mode B (EP-group): S==EP==8, ETP=1 → no world_size constraint
      # Expert GEMM: 256 experts × moe_ffn_hidden_size=2048 × H=7168
      #   → F=2048 per GPU shard, much larger than moe_proxy (F=256/shard)
      #   → FSEP benefit expected when r > 3
      #
      moe_fsep_sharding_degree: 8      # FSEP ON: S=EP=8, Mode B (EP-group)

      # ── Load monitoring ──
      moe_log_expert_load: true
