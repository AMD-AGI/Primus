configs:
  bf16:
    transformer_engine_config_type: "TEQuantizationParams"
    training_recipe: {}

matchers:
  self_attn_qkv_bf16:
    config: "bf16"
    type: "glob"
    pattern: "*.self_attention.linear_qkv"
    enabled: true
  self_attn_proj_bf16:
    config: "bf16"
    type: "glob"
    pattern: "*.self_attention.linear_proj"
    enabled: true
  shortconv_in_proj_bf16:
    config: "bf16"
    type: "glob"
    pattern: "*.self_attention.in_proj"
    enabled: true
  shortconv_out_proj_bf16:
    config: "bf16"
    type: "glob"
    pattern: "*.self_attention.out_proj"
    enabled: true
