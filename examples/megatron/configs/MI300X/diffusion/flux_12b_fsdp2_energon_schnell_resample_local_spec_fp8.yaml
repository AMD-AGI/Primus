# Flux 12B Schnell Training — FSDP2 + Local Spec + FP8 + FP8 All-Gather (MI300X)
#
# FP8 training on the FSDP2 (ZeRO-3) path with:
#   - FP8 training (tensorwise, local spec, dual FP8 output projection)
#   - FP8 all-gather (keep weight in FP8 after FSDP2 all-gather)
#   - BF16 master weight optimizer (BF16 params, FP32 optimizer states)
#   - torch.compile enabled

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_fsdp2_local_fp8}

workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: diffusion/flux_12b.yaml

    trainer_class: FluxPretrainTrainer

    overrides:
      model_type: flux_schnell

      # ==========================================
      # Flux Schnell training recipe
      # ==========================================
      timestep_sampling_strategy: "direct_uniform"
      activation_func: "openai_gelu"
      cfg_dropout_prob: 0.1

      # VAE latent normalization (required for resample mode)
      vae_scale: 0.3611
      vae_shift: 0.1159

      # Resample mode: re-draw latents from mean+logvar each step
      vae_latent_mode: resample

      # RoPE: must be interleaved to match Flux's EmbedND doubled-frequency layout
      rotary_interleaved: true

      # ==========================================
      # PrimusTurboLocalSpecProvider
      # ==========================================
      transformer_impl: "local"

      # ==========================================
      # ENERGON DATASET CONFIGURATION
      # ==========================================
      data_path: ${PRIMUS_DIFFUSION_DATA_PATH:/path/to/energon/dataset}

      # Training iterations (example value; increase for a full training run)
      train_iters: 1000
      eval_interval: 10000
      eval_iters: 0
      log_interval: 1
      save_interval: 10000

      # Batch configuration
      micro_batch_size: 52
      global_batch_size: 416
      seq_length: 512  # 256 img tokens + 256 text tokens (schnell)

      # Mixed precision
      bf16: true
      fp16: false

      # Optimizer settings
      optimizer: adam
      lr: 2.0e-4
      min_lr: 2.0e-4
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      clip_grad: 1.0

      # Learning rate scheduler (warmup-hold, no decay)
      lr_warmup_iters: 1600
      lr_decay_iters: 4000
      lr_decay_style: constant

      # DataLoader settings
      num_workers: 8
      dataloader_type: external
      max_samples_per_sequence: null

      # ==========================================
      # PyTorch FSDP2 Configuration (ZeRO-2)
      # ==========================================

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 1

      use_torch_fsdp2: true
      use_megatron_fsdp: false

      torch_fsdp2_reshard_after_forward: true  # ZeRO-3
      use_fsdp2_fp8_all_gather: true
      # fp8_all_gather_deq_requant: true  # Dequant FP8->BF16 after AG, fresh dynamic requant downstream
      # use_triton_ops: true  # Use Triton @triton_op modulate/LN+modulate (compile-transparent)
      fsdp_prefetch_depth: 1
      fp8_precompute_data_cache: false
      optimizer_foreach: false
      use_cpp_fp8_quantize: true

      # Optimizer mode: BF16 params + FP32 master weights
      use_fsdp2_fp32_param_optimizer: false
      use_fsdp2_bf16_master_weight_optimizer: true

      ckpt_format: torch_dist

      use_distributed_optimizer: false

      overlap_grad_reduce: false
      overlap_param_gather: false
      overlap_param_gather_with_optimizer_step: false
      use_precision_aware_optimizer: false

      gradient_accumulation_fusion: false

      # ==========================================
      # FP8 Configuration — Tensorwise via Primus Turbo
      # ==========================================

      use_flash_attn: true

      fp8: "e4m3"
      # Dynamic (tensorwise) scaling: the FSDP2 path does not yet exercise the
      # delayed amax allreduce, so use tensorwise here. Switch to
      # `fp8_recipe: "delayed"` once FSDP2 + delayed is wired up.
      fp8_recipe: "tensorwise"
      fp8_wgrad: true
      fp8_dot_product_attention: false
      fp8_multi_head_attention: false

      empty_unused_memory_level: 0

      distributed_timeout_minutes: 60
      distributed_backend: nccl

      # Checkpointing (disabled)
      finetune: false
      save: null
      load: null
      no_save_optim: true
      no_save_rng: true
      auto_continue_train: false
      disable_last_saving: true

      # Logging
      tensorboard_dir: output/tensorboard/flux_12b_fsdp2_local_fp8
      wandb_project: flux_12b_fsdp2_local_fp8
      log_throughput: true
      log_timers_to_tensorboard: true
      log_batch_size_to_tensorboard: true
      log_learning_rate_to_tensorboard: true
      log_memory_to_tensorboard: true

      # PyTorch Profiler
      profile: false
      use_pytorch_profiler: true
      profile_ranks: [0]
      profile_step_start: 9
      profile_step_end: 11
      torch_profiler_record_shapes: true
      torch_profiler_with_stack: true
      torch_profiler_use_gzip: false
      disable_profiler_activity_cpu: false

      # Primus Turbo Configuration
      enable_primus_turbo: true
      use_turbo_attention: true
      use_dual_fp8_output_projection: true

      seed: 2025

      # Torch Compile — compatible with Float8 local spec (per-module FP8)
      torch_compile:
        enable: true
        backend: "inductor"
        mode: "default"
        fullgraph: false
        compile_optimizer: true
