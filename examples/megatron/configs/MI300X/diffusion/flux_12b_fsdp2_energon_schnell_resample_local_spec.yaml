# Flux 12B Schnell Training — FSDP2 + Local Spec + BF16, VAE Resample Mode (MI300X)
#
# FSDP2 (ZeRO-2) BF16 training with the local spec provider and
# vae_latent_mode: resample.
#
# In resample mode, latents are re-drawn from stored mean+logvar via
# reparameterization (mean + exp(0.5*logvar) * randn) at every training step.
# This introduces per-step stochasticity in the VAE latents.
#
# Dataset must be an Energon pre-encoded dataset containing mean.pth and
# logvar.pth per sample.

work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:flux_12b_fsdp2_local_bf16}

workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml
    model: diffusion/flux_12b.yaml

    trainer_class: FluxPretrainTrainer

    overrides:
      model_type: flux_schnell

      # ==========================================
      # Flux Schnell training recipe
      # ==========================================
      timestep_sampling_strategy: "direct_uniform"
      activation_func: "openai_gelu"
      cfg_dropout_prob: 0.1

      # VAE latent normalization (required for resample mode)
      vae_scale: 0.3611
      vae_shift: 0.1159

      # Resample mode: re-draw latents from mean+logvar each step
      vae_latent_mode: resample

      # RoPE: must be interleaved to match Flux's EmbedND doubled-frequency layout
      rotary_interleaved: true

      # ==========================================
      # PrimusTurboLocalSpecProvider
      # ==========================================
      transformer_impl: "local"

      # ==========================================
      # ENERGON DATASET CONFIGURATION
      # ==========================================
      data_path: ${PRIMUS_DIFFUSION_DATA_PATH:/path/to/energon/dataset}

      # Training iterations (example value; increase for a full training run)
      train_iters: 1000
      eval_interval: 10000
      eval_iters: 0
      log_interval: 1
      save_interval: 10000

      # Batch configuration
      micro_batch_size: 32
      global_batch_size: 256
      seq_length: 512  # 256 img tokens + 256 text tokens (schnell)

      # Mixed precision
      bf16: true
      fp16: false

      # Optimizer settings
      optimizer: adam
      lr: 2.0e-4
      min_lr: 2.0e-4
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      clip_grad: 1.0

      # Learning rate scheduler (warmup-hold, no decay)
      lr_warmup_iters: 1600
      lr_decay_iters: 4000
      lr_decay_style: constant

      # DataLoader settings
      num_workers: 8
      dataloader_type: external
      max_samples_per_sequence: null

      # ==========================================
      # PyTorch FSDP2 Configuration (ZeRO-2)
      # ==========================================

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 1

      use_torch_fsdp2: true
      use_megatron_fsdp: false

      torch_fsdp2_reshard_after_forward: false  # ZeRO-2

      use_fsdp2_fp32_param_optimizer: true

      ckpt_format: torch_dist

      use_distributed_optimizer: false

      overlap_grad_reduce: false
      overlap_param_gather: false
      overlap_param_gather_with_optimizer_step: false
      use_precision_aware_optimizer: false

      gradient_accumulation_fusion: false

      # ==========================================
      # Memory Optimizations
      # ==========================================

      use_flash_attn: true

      fp8: null

      empty_unused_memory_level: 0

      distributed_timeout_minutes: 60
      distributed_backend: nccl

      # Checkpointing (disabled)
      finetune: false
      save: null
      load: null
      no_save_optim: true
      no_save_rng: true
      auto_continue_train: false
      disable_last_saving: true

      # Logging
      tensorboard_dir: output/tensorboard/flux_12b_fsdp2_local_bf16
      wandb_project: flux_12b_fsdp2_local_bf16
      log_throughput: true
      log_timers_to_tensorboard: true
      log_batch_size_to_tensorboard: true
      log_learning_rate_to_tensorboard: true
      log_memory_to_tensorboard: true

      # PyTorch Profiler
      profile: false
      use_pytorch_profiler: true
      profile_ranks: [0]
      profile_step_start: 9
      profile_step_end: 11
      torch_profiler_record_shapes: true
      torch_profiler_with_stack: true
      torch_profiler_use_gzip: false
      disable_profiler_activity_cpu: false

      # Primus Turbo Configuration
      enable_primus_turbo: true
      use_turbo_attention: true

      seed: 2025

      # Torch Compile
      torch_compile:
        enable: true
        backend: "inductor"
        mode: "default"
        fullgraph: false
        compile_optimizer: true
