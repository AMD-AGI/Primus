work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:qwen3_30B_A3B-turbo-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # model to run
    model: ${PRIMUS_MODEL:qwen3_30B_A3B}.yaml
    overrides:
      # log
      wandb_project: "Primus_Qwen3_30B_A3B_Turbo_Pretrain"
      stderr_sink_level: DEBUG

      # debug
      moe_router_force_load_balancing: true
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      # hyper parameters
      train_iters: 50
      micro_batch_size: 4
      global_batch_size: 256
      seq_length: ${PRIMUS_SEQ_LENGTH:4096}
      max_position_embeddings: ${PRIMUS_MAX_POSITION_EMBEDDINGS:4096}
      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      # parallel
      tensor_model_parallel_size: ${PRIMUS_TP:1}
      pipeline_model_parallel_size: ${PRIMUS_PP:1}
      expert_model_parallel_size: ${PRIMUS_EP:8}
      overlap_grad_reduce: true
      overlap_param_gather: true

      # data
      mock_data: true
      train_data_path: ${PRIMUS_TOKENIZED_DATA_PATH:null}
      valid_data_path: null
      test_data_path: null

      gradient_accumulation_fusion: false

      # Use legacy grouped gemm path for PrimusTurbo compatibility
      # PrimusTurboGroupedMLP uses pt.ops.grouped_gemm which is faster
      # than TE's TEGroupedMLP for MoE expert computation.
      moe_use_legacy_grouped_gemm: true

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch
      eval_iters: 0

      # ==========================================
      # Primus Turbo Optimizations for Qwen3 MoE
      # ==========================================
      enable_primus_turbo: true

      # Turbo attention: flash attention via primus_turbo
      use_turbo_attention: true

      # Turbo grouped MLP: pt.ops.grouped_gemm replaces gg.ops.gmm
      # Includes FP8 grouped_gemm support and fused activation
      use_turbo_grouped_mlp: true

      # Fused SwiGLU × probs: eliminates separate activation + mul kernels
      use_turbo_fused_act_with_probs: true

      # Fused router: merges topk + score computation into single kernel
      # Supports softmax score function with pre_softmax=true (Qwen3 default)
      moe_use_fused_router_with_aux_score: true

      # DeepEP: fused AlltoAll token dispatch/combine
      use_turbo_deepep: true
      turbo_deepep_num_cu: 64
      turbo_deepep_use_comm_stream: false

      # Sync-free MoE: eliminate GPU-CPU sync in MoE dispatch
      # Stage 2 recommended for best perf/memory tradeoff
      turbo_sync_free_moe_stage: 2

      # Turbo RMSNorm
      use_turbo_rms_norm: true
