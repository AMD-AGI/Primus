work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:zebra_llama_1B_kda-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # model to run
    model: zebra_llama_1B.yaml
    overrides:
      # log
      wandb_project: "Primus_Zebra_Llama_1B_KDA_Pretrain"
      stderr_sink_level: DEBUG

      eval_iters: 0
      
      num_workers: 0
      create_attention_mask_in_dataloader: false
      
      profile: false
      use_pytorch_profiler: false
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      train_iters: 38147
      micro_batch_size: 4
      global_batch_size: 32 # micro_batch_size * num_gpus

      seq_length: 8192  
      max_position_embeddings: 8192
      original_max_position_embeddings: 8192

      lr: 2.0e-4
      min_lr: 2.0e-5
      lr_warmup_iters: 200
      lr_decay_iters: 38147
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true

      # Use KDA (Kimi Delta Attention) hybrid spec
      spec: ['primus.backends.megatron.core.models.hybrid.hybrid_mamba_mla_layer_specs', 'kda_hybrid_stack_spec']
      use_fla_triton_kda: true
      
      # Tokenizer
      tokenizer_type: HuggingFaceTokenizer
      tokenizer_model: meta-llama/Llama-3.2-1B
      
      # parallel
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: true
      use_torch_fsdp2: false
      use_distributed_optimizer: true

      # data
      mock_data: true
      train_data_path: >
        /home/vanbhati@amd.com/Primus/data/fineweb-edu-10BT/HuggingFaceTokenizer/fineweb_edu_10BT_0_text_sentence
        /home/vanbhati@amd.com/Primus/data/fineweb-edu-10BT/HuggingFaceTokenizer/fineweb_edu_10BT_1_text_sentence
        /home/vanbhati@amd.com/Primus/data/fineweb-edu-10BT/HuggingFaceTokenizer/fineweb_edu_10BT_2_text_sentence
        /home/vanbhati@amd.com/Primus/data/fineweb-edu-10BT/HuggingFaceTokenizer/fineweb_edu_10BT_3_text_sentence
      valid_data_path: null
      test_data_path: null

      # ckpt
      finetune: false
      auto_continue_train: true
      load: null
      save: ./output/zebra_llama_1B_kda-pretrain
      save_interval: 1000
      disable_last_saving: false
      ckpt_format: torch

      # Turbo
      enable_primus_turbo: false
      use_turbo_attention: false

      # context parallel
      context_parallel_size: 1
