work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:zebra_llama_300M_gdn_pure-memsweep}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    model: zebra_llama_300M_gdn_pure.yaml
    overrides:
      wandb_project: null
      stderr_sink_level: INFO

      eval_iters: 0
      num_workers: 8
      create_attention_mask_in_dataloader: false
      profile: false
      use_pytorch_profiler: false

      # Memory sweep: log every iter, only run a few iters
      log_avg_skip_iterations: 0
      log_avg_reset_interval: 50
      log_interval: 1
      check_for_nan_in_loss_and_grad: false
      barrier_with_L1_time: false
      seed: 42

      layernorm_epsilon: 1.0e-6
      hidden_dropout: 0.0
      attention_dropout: 0.0

      # Swept via env vars. Default grad-accum = 1 (global = micro * dp(8)).
      train_iters: 3
      micro_batch_size: ${SWEEP_MBS:8}
      global_batch_size: ${SWEEP_GBS:64}

      seq_length: 2048
      max_position_embeddings: 2048
      original_max_position_embeddings: 2048

      clip_grad: 1.0
      lr: 2.0e-4
      min_lr: 2.0e-5
      lr_warmup_iters: 0
      lr_decay_iters: 4768
      lr_decay_style: cosine
      weight_decay: 0.01
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: false

      spec: ['primus.backends.megatron.core.models.hybrid.hybrid_mamba_mla_layer_specs', 'gdn_hybrid_stack_spec_no_te']
      no_persist_layer_norm: true

      tokenizer_type: HuggingFaceTokenizer
      tokenizer_model: meta-llama/Llama-3.2-1B

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      overlap_grad_reduce: true
      overlap_param_gather: false
      gradient_accumulation_fusion: false
      use_torch_fsdp2: false
      use_distributed_optimizer: false
      ddp_average_in_collective: true

      # Use the REAL Llama tokenizer + data so padded_vocab_size (128256) and
      # thus the output-logits memory match production. (mock_data would force
      # NullTokenizer with a different vocab and invalidate the measurement.)
      # Random init (load: null) is fine — memory footprint is independent of
      # weight values.
      mock_data: false
      train_data_path: >
        /home/vanbhati@amd.com/Primus/data/fla_aligned/fla_fineweb_edu_10BT_text_sentence
      valid_data_path: null
      test_data_path: null

      finetune: false
      auto_continue_train: false
      no_load_optim: true
      no_load_rng: true
      load: null
      save: null
      save_interval: 999999
      disable_last_saving: true
      ckpt_format: torch

      enable_primus_turbo: false
      use_turbo_attention: false
      context_parallel_size: 1
