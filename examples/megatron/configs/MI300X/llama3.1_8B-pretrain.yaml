# Primus Configuration: LLaMA 3.1 8B Pre-training on MI300X
work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:llama3.1_8B-pretrain}
workspace: ./output

modules:
  - name: pre_trainer
    module: pre_trainer

    # Framework and model configuration
    framework: megatron
    config: pre_trainer.yaml
    model: llama3.1_8B.yaml

    overrides:
      # ========== Training Configuration ==========
      train_iters: 50
      micro_batch_size: 2
      global_batch_size: 128

      # ========== Parallelism Configuration ==========
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false

      # ========== Data Configuration ==========
      mock_data: true
      train_data_path: null
      valid_data_path: null
      test_data_path: null

      wandb_project: "Primus_DeepSeek_Pretrain"

      # disable_wandb: false
      # disable_tensorboard: false
      stderr_sink_level: DEBUG
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      # ========== Primus Turbo Configuration ==========
      enable_primus_turbo: true
      use_turbo_attention: true
      use_turbo_grouped_mlp: true
