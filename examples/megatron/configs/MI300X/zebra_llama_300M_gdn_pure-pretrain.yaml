work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:zebra_llama_300M_gdn_pure-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    model: zebra_llama_300M_gdn_pure.yaml
    overrides:
      wandb_project: "Primus_Zebra_Llama_300M_GDN_Pure_Pretrain"
      stderr_sink_level: DEBUG

      eval_iters: 0

      num_workers: 8
      create_attention_mask_in_dataloader: false

      profile: false
      use_pytorch_profiler: false
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50
      log_interval: 100
      check_for_nan_in_loss_and_grad: false

      # Perf: Megatron defaults to inserting dist.barrier() before every L1
      # timer measurement (~5-10/iter) to make per-stage timings comparable.
      # This serializes ranks. Disable for production training.
      barrier_with_L1_time: false

      # Match FLA seed for reproducibility comparison
      seed: 42

      # Fix: norm_epsilon in model YAML maps to args.norm_epsilon, but
      # TransformerConfig uses layernorm_epsilon (default 1e-5).
      # Must explicitly set layernorm_epsilon to match FLA's 1e-6.
      layernorm_epsilon: 1.0e-6

      # CRITICAL: Megatron's TransformerConfig defaults hidden_dropout=0.1 and
      # attention_dropout=0.1 (transformer_config.py L152). Even though
      # mamba_base.yaml sets these to 0.0, the YAML inheritance is being
      # overridden by language_model.yaml (which sets 0.1) and the override is
      # not propagating to args. This caused embeddings to be dropout-perturbed
      # at every iteration in prior runs (verified empirically: same token
      # produced DIFFERENT embedding vectors with 1/(1-0.1)=1.111 scaling).
      # FLA does NOT apply any dropout. Force these to 0 here to match.
      hidden_dropout: 0.0
      attention_dropout: 0.0

      # Training schedule — matched to FLA (8 GPUs):
      #   FLA: per_device_train_batch_size=128, 8 GPUs → global=1024
      #   tokens/step = 1024 * 2048 = 2,097,152
      #   total tokens ~= 4768 * 2,097,152 ≈ 10B
      train_iters: 50
      micro_batch_size: 128
      global_batch_size: 1024

      seq_length: 2048
      max_position_embeddings: 2048
      original_max_position_embeddings: 2048

      # Optimizer — matched to FLA:
      #   lr=2e-4, cosine (min_lr_rate=0.1 → min_lr=2e-5)
      #   AdamW, beta1=0.9, beta2=0.95, weight_decay=0.01
      #   max_grad_norm=1.0, warmup_steps=200
      clip_grad: 1.0
      lr: 2.0e-4
      min_lr: 2.0e-5
      lr_warmup_iters: 200
      lr_decay_iters: 4768
      lr_decay_style: cosine
      weight_decay: 0.01
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: false

      # Pure GDN hybrid spec (hybrid_attention_ratio=0.0 → all GDN, no MLA)
      # Use no-TE spec to match FLA's native PyTorch layers for loss curve alignment
      spec: ['primus.backends.megatron.core.models.hybrid.hybrid_mamba_mla_layer_specs', 'gdn_hybrid_stack_spec_no_te']
      no_persist_layer_norm: true

      # Tokenizer
      tokenizer_type: HuggingFaceTokenizer
      tokenizer_model: meta-llama/Llama-3.2-1B

      # Parallelism
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      # Perf: For a small 300M model, distributed optimizer (ZeRO-1) adds
      # REDUCE-SCATTER + ALL-GATHER overhead with no memory savings (full
      # optimizer state ~3.6GB easily fits per-rank). Switch to plain DDP
      # ALL-REDUCE to match FLA. Memory cost: +3GB/rank, expected: ~10-15% faster.
      # NOTE: overlap_param_gather requires distributed optimizer, so disable it.
      overlap_grad_reduce: false
      overlap_param_gather: false
      gradient_accumulation_fusion: false
      use_torch_fsdp2: false
      use_distributed_optimizer: false
      ddp_average_in_collective: true

      # Data
      mock_data: true
      train_data_path: null
      valid_data_path: null
      test_data_path: null

      # Checkpoints
      finetune: false
      auto_continue_train: false
      save: ./output/zebra_llama_300M_gdn_pure-pretrain
      save_interval: 1024
      disable_last_saving: false
      ckpt_format: torch

      # Turbo
      enable_primus_turbo: false
      use_turbo_attention: false

      # Context parallel
      context_parallel_size: 1
