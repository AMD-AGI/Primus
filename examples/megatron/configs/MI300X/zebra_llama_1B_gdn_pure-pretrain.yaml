work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:zebra_llama_1B_gdn_pure-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    model: zebra_llama_1B_gdn_pure.yaml
    overrides:
      wandb_project: "Primus_Zebra_Llama_1B_GDN_Pure_Pretrain"
      stderr_sink_level: DEBUG

      eval_iters: 0

      num_workers: 0
      create_attention_mask_in_dataloader: false

      profile: false
      use_pytorch_profiler: false
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      # Training schedule — matched to FLA (4 GPUs):
      #   batch=16, update=1, gpus=4, context=2048
      #   global_batch = 16 * 4 = 64, tokens/step = 64 * 2048 = 131,072
      #   total tokens ~= 76294 * 131072 ≈ 10B
      train_iters: 76294
      micro_batch_size: 16
      global_batch_size: 64

      seq_length: 2048
      max_position_embeddings: 2048
      original_max_position_embeddings: 2048

      # Optimizer — matched to FLA:
      #   lr=2e-4, cosine (min_lr_rate=0.1 → min_lr=2e-5)
      #   AdamW, beta1=0.9, beta2=0.95, weight_decay=0.01
      #   max_grad_norm=1.0, warmup_steps=200
      # Both DeepSpeed ZeRO-2 and Megatron clip on ||avg_grad||.
      # DeepSpeed pre-divides by dp_size before reduce_scatter(SUM),
      # so its grad norm is on averaged gradients. Match FLA's 1.0 directly.
      clip_grad: 1.0
      lr: 2.0e-4
      min_lr: 2.0e-5
      lr_warmup_iters: 200
      lr_decay_iters: 76294
      lr_decay_style: cosine
      weight_decay: 0.01
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: false

      # Pure GDN hybrid spec (hybrid_attention_ratio=0.0 → all GDN, no MLA)
      spec: ['primus.backends.megatron.core.models.hybrid.hybrid_mamba_mla_layer_specs', 'gdn_hybrid_stack_spec']

      # Tokenizer
      tokenizer_type: HuggingFaceTokenizer
      tokenizer_model: meta-llama/Llama-3.2-1B

      # Parallelism
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: true
      use_torch_fsdp2: false
      use_distributed_optimizer: true

      # Data — FLA-aligned FineWeb-Edu sample-10BT
      # Converted from FLA's preprocessed Arrow dataset so both
      # frameworks see the exact same tokens in the same order.
      mock_data: false
      train_data_path: >
        /home/vanbhati@amd.com/Primus/data/fla_aligned/fla_fineweb_edu_10BT_text_sentence
      valid_data_path: null
      test_data_path: null

      # Checkpoints
      finetune: false
      auto_continue_train: true
      load: null
      save: ./output/zebra_llama_1B_gdn_pure-pretrain
      save_interval: 2048
      disable_last_saving: false
      ckpt_format: torch

      # Turbo
      enable_primus_turbo: false
      use_turbo_attention: false

      # Context parallel
      context_parallel_size: 1
