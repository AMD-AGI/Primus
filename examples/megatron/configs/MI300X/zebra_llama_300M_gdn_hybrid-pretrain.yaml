work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:zebra_llama_300M_gdn_hybrid-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    model: zebra_llama_300M_gdn_hybrid.yaml
    overrides:
      wandb_project: "Primus_Zebra_Llama_300M_GDN_Hybrid_Pretrain"
      stderr_sink_level: DEBUG

      eval_iters: 0

      # FLA parity: HF Trainer prefetches lightly from a memmap'd parquet, so
      # 2 dataloader workers per rank (= 16 forked subprocesses on 8 GPUs) is
      # enough to keep the dataloader pipeline full without bloating host RSS.
      # `num_workers: 8` (= 64 forked subprocesses) was OOM-killing the host
      # at ~iter 1200 on this 125 GB-RAM box.
      num_workers: 2
      create_attention_mask_in_dataloader: false

      profile: false
      use_pytorch_profiler: false
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50
      log_interval: 100
      check_for_nan_in_loss_and_grad: false

      # Perf: disable barrier-with-L1-time (serializes ranks per L1 timer call)
      barrier_with_L1_time: false

      # Match FLA seed for reproducibility comparison
      seed: 42

      # norm_epsilon in the model YAML maps to args.norm_epsilon, but
      # TransformerConfig uses layernorm_epsilon (default 1e-5).
      # Set explicitly to match FLA's 1e-6.
      layernorm_epsilon: 1.0e-6

      # FLA does no dropout; force off (Megatron defaults are 0.1)
      hidden_dropout: 0.0
      attention_dropout: 0.0

      # Training schedule — matched to FLA (8 GPUs, FineWeb-Edu sample-10BT):
      #   FLA: per_device_train_batch_size=128 × 8 GPUs → global=1024
      #   tokens/step = 1024 × 2048 = 2,097,152
      #   4768 steps × 2.097M ≈ 10B tokens
      train_iters: 4768
      micro_batch_size: 128
      global_batch_size: 1024

      seq_length: 2048
      max_position_embeddings: 2048
      original_max_position_embeddings: 2048

      # Optimizer — matched to FLA:
      #   lr=2e-4, cosine (min_lr_rate=0.1 → min_lr=2e-5)
      #   AdamW, beta1=0.9, beta2=0.95, weight_decay=0.01
      #   max_grad_norm=1.0, warmup_steps=200
      clip_grad: 1.0
      lr: 2.0e-4
      min_lr: 2.0e-5
      lr_warmup_iters: 200
      lr_decay_iters: 4768
      lr_decay_style: cosine
      weight_decay: 0.01
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: false

      # Hybrid GDN+MLA stack (no-TE spec to match FLA layers; same spec as pure GDN)
      # With hybrid_attention_ratio=0.25, the allocator places MLA at mixer blocks
      # [0, 4, 8] — identical to FLA's `attn.layers: [0, 4, 8]`.
      spec: ['primus.backends.megatron.core.models.hybrid.hybrid_mamba_mla_layer_specs', 'gdn_hybrid_stack_spec_no_te']
      no_persist_layer_norm: true

      # Tokenizer
      tokenizer_type: HuggingFaceTokenizer
      tokenizer_model: meta-llama/Llama-3.2-1B

      # Parallelism.
      #
      # Distributed optimizer (ZeRO-1) shards optimizer state across DP ranks
      # and amortizes the per-iter Adam step over the DP group.  Previously
      # disabled because pairing it with `overlap_param_gather: true` skewed
      # per-rank GPU memory by ~30 GB (gathered param buffer aggregated on
      # ranks 0-1 → 189 GB used, ranks 2-7 → 155 GB), OOMing FLA's LCE
      # 7.83 GB chunk.  With the new FLA-fusion stack (PRIMUS_FLA_NORM=1 →
      # FusedRMSNormGated, in-kernel gate fusion) every rank now sits at
      # ~171 GB / 192 GB, leaving ~21 GB headroom — enough for the
      # distributed optimizer's gather buffer as long as `overlap_param_gather`
      # stays off.
      #
      # Expected gain: ~25 ms/iter (closes the bulk of the remaining gap vs
      # FLA's DeepSpeed-ZeRO-2 optimizer step amortization).
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true   # ZeRO-1 — shards optimizer state
      overlap_grad_reduce: false        # DDP buffer assertion fails with hybrid models
      overlap_param_gather: false       # leave OFF — the skew that caused OOM
      gradient_accumulation_fusion: false
      use_torch_fsdp2: false
      ddp_average_in_collective: true

      # Data — FLA-aligned FineWeb-Edu sample-10BT (same indexed binary the
      # pure GDN/KDA 300M runs consume; uses FLAOrderGPTDataset for identical
      # token ordering to FLA)
      mock_data: true
      train_data_path: null
      valid_data_path: null
      test_data_path: null

      # Checkpoints — train from scratch by default. To start from an
      # FLA-initialized weights snapshot for iter-1 parity, set
      #   finetune: true
      #   load: /path/to/fla_init_hybrid_ckpt
      #   no_load_optim: true
      #   no_load_rng: true
      finetune: false
      auto_continue_train: false
      load: null
      save: ./output/zebra_llama_300M_gdn_hybrid-pretrain
      # FLA parity: FLA's setup_and_train_gdn_hybrid_300M.sh uses `save=99999`,
      # i.e. it only writes a checkpoint at the very end of the 4768-step run.
      # The mid-training save we previously did at iter 1024 spiked host RSS
      # (each rank materialises its full state-dict in CPU memory during the
      # save) and the OS OOM-killer took us out around iter 1200 on this
      # 125 GB-RAM host.  Match FLA: skip mid-run saves, keep the end save.
      save_interval: 99999
      disable_last_saving: false
      ckpt_format: torch

      # Turbo (kept off to match FLA's vanilla PyTorch path)
      enable_primus_turbo: false
      use_turbo_attention: false

      # Context parallel
      context_parallel_size: 1
