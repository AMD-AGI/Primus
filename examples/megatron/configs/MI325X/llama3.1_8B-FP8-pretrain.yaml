work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:llama3.1_8B-pretrain}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # model to run
    model: llama3.1_8B.yaml
    overrides:
      # log
      wandb_project: "Primus_DeepSeek_Pretrain"
      # disable_wandb: false
      # disable_tensorboard: false
      stderr_sink_level: DEBUG

      log_avg_skip_iterations: 2
      log_avg_reset_interval: 50

      train_iters: 25
      micro_batch_size: 4
      global_batch_size: 128

      seq_length: 8192
      max_position_embeddings: 8192

      lr: 1.0e-5
      min_lr: 0.0
      lr_warmup_iters: 2
      lr_decay_iters: null
      lr_decay_style: cosine
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: true
      init_method_std: 0.008
      norm_epsilon: 1.0e-6

      # parallel
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      overlap_grad_reduce: true
      overlap_param_gather: true
      gradient_accumulation_fusion: false

      # data
      mock_data: true
      train_data_path: null
      valid_data_path: null
      test_data_path: null

      # ckpt
      finetune: false
      auto_continue_train: false
      load: null
      no_load_optim: null
      no_load_rng: null
      save: null
      save_interval: 20000
      no_save_optim: null
      no_save_rng: null
      disable_last_saving: true
      ckpt_format: torch

      # Turbo
      enable_primus_turbo: true
      use_turbo_attention: false
      use_turbo_grouped_gemm: false

      # Cross entropy flags
      cross_entropy_fusion_impl: "te"
      cross_entropy_loss_fusion: true

      # enable fp8 training
      fp8: hybrid
      # FP8 recipe: keep delayed scaling (the inherited default), which is the
      # fastest FP8 path here (~3% higher throughput than tensorwise/current
      # scaling because it reuses cached amax history instead of recomputing
      # per-step amax). However, the delayed_fp8_scaling stream patches
      # (secondary-stream grad-zero + data prefetch) have a use-after-free that
      # crashes with a GPU memory fault (sum_and_scatter, "write to read-only
      # page") at ~iter 6, so disable them. Alternative: fp8_recipe=tensorwise
      # (Turbo-native, no patches, ~3% slower).
      fp8_recipe: delayed
      disable_delayed_scaling_patches: true
      moe_use_legacy_grouped_gemm: false
