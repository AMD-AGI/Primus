work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: mamba_parity_flaexact_flainit
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  pre_trainer:
    framework: megatron
    config: pre_trainer.yaml

    # FLA-EXACT architectural replica (see the model yaml header for the full
    # diff table).  Everything below — schedule, data, FLA runtime knobs — is
    # identical to sanity_before_push/configs/300M_mamba_hybrid.yaml so the ONLY
    # variable that changes vs the production hybrid is the architecture.
    model: zebra_llama_300M_mamba_hybrid_flaexact.yaml
    overrides:
      wandb_project: ""
      stderr_sink_level: DEBUG

      eval_iters: 0
      num_workers: 2
      create_attention_mask_in_dataloader: false

      profile: false
      use_pytorch_profiler: false
      log_avg_skip_iterations: 2
      log_avg_reset_interval: 100
      log_interval: 10
      check_for_nan_in_loss_and_grad: false
      barrier_with_L1_time: false

      seed: 42

      # FLA mamba2 reference uses RMSNorm eps = 1e-5 (NOT 1e-6).
      layernorm_epsilon: 1.0e-5

      hidden_dropout: 0.0
      attention_dropout: 0.0

      # Same schedule as FLA's mamba2_300M run (warmup 200, peak 2e-4,
      # cosine decay over 4768) — stop at warmup+500 = 700 iters.
      train_iters: 700
      micro_batch_size: 128
      global_batch_size: 1024

      seq_length: 2048
      max_position_embeddings: 2048
      original_max_position_embeddings: 2048

      clip_grad: 1.0
      lr: 2.0e-4
      min_lr: 2.0e-5
      lr_warmup_iters: 200
      lr_decay_iters: 4768
      lr_decay_style: cosine
      weight_decay: 0.01
      adam_beta1: 0.9
      adam_beta2: 0.95
      eod_mask_loss: false

      # FLA runtime knobs — identical to the production mamba sanity run.
      use_fla_fused_swiglu: true
      use_fla_fused_rmsnorm: true
      use_fla_fused_gated_norm: true
      use_fla_data: true
      fused_ce_mode: 1
      fla_mla_attn: "1"

      spec: ['primus.backends.megatron.core.models.hybrid.hybrid_mamba_mla_layer_specs', 'mamba_hybrid_stack_spec_no_te']
      no_persist_layer_norm: true

      tokenizer_type: HuggingFaceTokenizer
      tokenizer_model: meta-llama/Llama-3.2-1B

      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      overlap_grad_reduce: true
      overlap_param_gather: false
      gradient_accumulation_fusion: false
      use_torch_fsdp2: false
      ddp_average_in_collective: true

      mock_data: false
      train_data_path: >
        /home/vanbhati@amd.com/Primus/data/fla_aligned/fla_fineweb_edu_10BT_text_sentence
      valid_data_path: null
      test_data_path: null

      auto_continue_train: false
      # FLA-init: load the converted FLA mamba2 weights, fresh optimizer/RNG.
      load: ./output/fla_init_mamba2_flaexact
      finetune: true
      no_load_optim: true
      no_load_rng: true
      save: ./output/mamba_parity/300M_mamba_hybrid_flaexact_flainit
      save_interval: 99999
      disable_last_saving: false
      ckpt_format: torch

      enable_primus_turbo: false
      use_turbo_attention: false

      context_parallel_size: 1
