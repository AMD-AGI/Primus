# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Install
# 1. pip install pre-commit
# 2. pre-commit install(the first time you download the repo, it will be cached for future use)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          [
            "--remove-all-unused-imports",
            "--remove-unused-variables",
            "--expand-star-imports",
            "--ignore-init-module-imports",
            "--recursive",
            "--in-place",
          ]
  # Using this mirror lets us use mypyc-compiled black, which is about 2x faster
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.8.0
    hooks:
      - id: black
        args: ["--verbose", "--line-length=110"]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: local
    hooks:
      # Keep the committed primus/_thirdparty.lock in sync with the submodule
      # pins. always_run because a submodule bump changes a gitlink, not a file
      # pre-commit would otherwise match; if the lock changes the commit fails so
      # the regenerated lock gets staged. Mirrors the release CI drift check.
      - id: thirdparty-lock
        name: regenerate primus/_thirdparty.lock from submodule pins
        entry: python tools/pip_index/gen_thirdparty_lock.py
        language: system
        pass_filenames: false
        always_run: true
